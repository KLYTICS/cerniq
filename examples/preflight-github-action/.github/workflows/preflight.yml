# CERNIQ preflight — ship-readiness gate
#
# Runs `make preflight` on every PR + push to main. Posts a sticky
# comment to the PR with the result table. Fails the job on exit 2
# (gating fail); fails-with-warning on exit 1.
#
# See examples/preflight-github-action/README.md for the install
# instructions and behavior matrix.

name: preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: ship-readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run preflight (JSON output)
        id: preflight
        # `--json` mode writes to stdout; capture to file. Don't fail the
        # step here — we want to render the comment first, then exit.
        run: |
          set +e
          make preflight ARGS="--json" > preflight.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Render sticky-comment Markdown
        if: github.event_name == 'pull_request'
        id: render
        run: |
          node <<'EOF' > comment.md
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('preflight.json', 'utf8'));
          const v =
            data.exitCode === 0 ? '✅ **READY TO SHIP**'
            : data.exitCode === 1 ? '⚠️ **SHIP WITH CARE** (warnings)'
            : data.exitCode === 2 ? '❌ **DO NOT SHIP** (gating failure)'
            : '🛠️ **preflight tool errored**';
          const sym = (s) => ({ pass: '✅', warn: '⚠️', fail: '❌', skip: '⏭️' }[s] || '?');
          const rows = data.checks
            .map(c => `| ${sym(c.status)} | \`${c.id}\` | ${c.label} | ${c.details ?? ''} |`)
            .join('\n');
          const remediation = data.checks
            .filter(c => c.status === 'fail' && c.remediation)
            .map(c => `- **${c.id}**: ${c.remediation}`)
            .join('\n');
          const out = [
            `## CERNIQ preflight — ${v}`,
            '',
            `**Result**: ${data.summary.pass} pass · ${data.summary.warn} warn · ${data.summary.fail} fail · ${data.summary.skip} skip · exit ${data.exitCode}  `,
            `**Run**: \`${process.env.GITHUB_REF_NAME}\` @ \`${process.env.GITHUB_SHA?.slice(0,7)}\``,
            '',
            '| Status | ID | Check | Details |',
            '|---|---|---|---|',
            rows,
            ...(remediation ? ['', '### Remediation', '', remediation] : []),
            '',
            '<details><summary>Raw JSON</summary>',
            '',
            '```json',
            JSON.stringify(data, null, 2).slice(0, 30000),
            '```',
            '',
            '</details>',
            '',
            '_Generated by `tools/preflight/preflight.ts` · See [TERMINAL_ORCHESTRATION.md](../../docs/TERMINAL_ORCHESTRATION.md) for context._',
          ].join('\n');
          process.stdout.write(out);
          EOF

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cerniq-preflight
          path: comment.md

      - name: Upload preflight artifact
        uses: actions/upload-artifact@v4
        with:
          name: preflight-json-${{ github.run_id }}
          path: preflight.json
          retention-days: 30

      - name: Surface exit code
        # Re-emit the preflight exit code as the job's status. This is
        # what branch protection rules read.
        run: |
          code=${{ steps.preflight.outputs.exit_code }}
          echo "preflight exit code: $code"
          exit "$code"
