name: spec-sync

# Drift guard for the three sources of truth that must agree:
#   - docs/spec/AEGIS_API_SPEC.yaml          (OpenAPI, source of truth for the wire)
#   - packages/types/src/{schemas,constants}.ts  (Zod, source of truth at the API boundary)
#   - apps/api/prisma/schema.prisma          (DB shape — informs response payloads)
#
# When any of these diverges from the others, downstream tooling
# (mcp-server tools/list, dashboard fetch, sdk types, verifier-rp,
# CLI oapi-codegen) breaks silently. This workflow makes the divergence
# loud — it fails the build with a diff comment on the PR.
#
# Three checks run in parallel:
#   1. openapi-vs-zod   — types in OpenAPI ↔ Zod schemas align
#   2. openapi-vs-prisma — every Prisma model with a corresponding API
#                         resource has matching nullability / types
#   3. denial-precedence — the locked enum from ADR-0004 is byte-identical
#                         across all three places (verifier-rp, builtin
#                         engine, OpenAPI enum)
#
# This is a CI-only check; nothing runs in production. Failures land
# on the PR as annotations + a /spec-sync.json artifact for triage.

on:
  pull_request:
    paths:
      - 'docs/spec/**'
      - 'packages/types/**'
      - 'apps/api/prisma/schema.prisma'
      - 'apps/api/src/modules/**/*.dto.ts'
      - 'apps/api/src/modules/verify/algorithm/**'
      - '.github/workflows/spec-sync.yml'
  push:
    branches: [main]

jobs:
  openapi-vs-zod:
    name: OpenAPI ↔ Zod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify Zod schemas match OpenAPI shapes
        run: pnpm -F @aegis/types exec tsx scripts/check-openapi-zod-parity.ts
      - name: Upload diff artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spec-sync-openapi-zod
          path: |
            spec-sync.json

  openapi-vs-prisma:
    name: OpenAPI ↔ Prisma
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @aegis/api prisma:generate
      - name: Compare Prisma model fields to OpenAPI schemas
        run: pnpm -F @aegis/api exec tsx scripts/check-openapi-prisma-parity.ts

  denial-precedence:
    name: Denial precedence enum (ADR-0004)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff DenialReason enum across files
        run: |
          set -euo pipefail
          # Engine is the canonical source of truth (engine.interface.ts).
          # ADR-0004 § "Denial Precedence" defines the locked enum. Verifier-rp
          # MAY be a superset (e.g. REPLAY_DETECTED is client-cache-only);
          # OpenAPI top-level DenialReason schema MUST be a superset of engine.

          # Extract between `type DenialReason =` and the terminating `;` —
          # semantic boundary, immune to adjacent type aliases (TrustBand
          # in verifier-rp, PolicyScope in engine) that a line-counted
          # `grep -A N` would falsely include.
          # All three extractors emit BARE values (no quotes) so `comm`
          # comparisons aren't broken by quote-format mismatch — the
          # engine/verifier files store enum values as TS string literals
          # `'AGENT_NOT_FOUND'` (with quotes); the OpenAPI YAML stores them
          # as bare list items `- AGENT_NOT_FOUND` (no quotes). The
          # original workflow returned `'AGENT_NOT_FOUND'` from engine/
          # verifier and `AGENT_NOT_FOUND` from openapi — `comm` saw them
          # as different strings and the comparison silently produced
          # wrong diffs. This bug was masked for months by the substring
          # trap in extract_openapi (which returned essentially nothing
          # comparable), so the quote-format bug never surfaced.
          extract_engine() {
            sed -n '/type DenialReason =/,/;/p' \
              apps/api/src/common/policy-engine/engine.interface.ts \
              | grep -oE "'[A-Z_]+'" | tr -d "'" | sort -u
          }
          extract_verifier() {
            sed -n '/type DenialReason =/,/;/p' \
              packages/verifier-rp/src/types.ts 2>/dev/null \
              | grep -oE "'[A-Z_]+'" | tr -d "'" | sort -u || true
          }
          extract_openapi() {
            # Anchor on schema-level indentation (4 spaces under
            # components.schemas) to avoid substring matches such as
            # `recommendedDenialReason:` (a property reference on
            # ReconcileIntentResponse). The list-item regex `^- [A-Z_]+`
            # restricts extraction to YAML enum entries so description
            # prose with uppercase acronyms (ADR, AEGIS) cannot poison
            # the comparison.
            awk '
              /^    DenialReason:/ { capture=1; next }
              capture && /^    [A-Za-z]/ { capture=0 }
              capture { print }
            ' docs/spec/AEGIS_API_SPEC.yaml 2>/dev/null \
              | grep -oE "^[[:space:]]+- [A-Z_]+" \
              | grep -oE "[A-Z_]+" | sort -u || true
          }

          engine="$(extract_engine || true)"
          verifier="$(extract_verifier || true)"
          openapi="$(extract_openapi || true)"

          echo "=== engine ==="; echo "$engine"
          echo "=== verifier ==="; echo "$verifier"
          echo "=== openapi ==="; echo "$openapi"

          # ── Extractor sanity check ────────────────────────────────────
          # Every extractor MUST find at least one entry. Empty extraction
          # against a non-empty source file means the extractor regex/path
          # is broken, not real drift. The original M-056 bug masqueraded
          # as drift for 5+ SHAs because the bash extractor silently
          # returned nothing. This check makes that failure mode loud.
          if [ -z "$engine" ]; then
            echo "::error::extractor 'engine' returned empty — likely a sed/grep bug in extract_engine(), not real drift. Check apps/api/src/common/policy-engine/engine.interface.ts for a renamed 'type DenialReason ='."
            exit 1
          fi
          if [ -z "$verifier" ]; then
            echo "::error::extractor 'verifier' returned empty — likely a sed/grep bug in extract_verifier(), not real drift. Check packages/verifier-rp/src/types.ts."
            exit 1
          fi
          if [ -z "$openapi" ]; then
            echo "::error::extractor 'openapi' returned empty — likely an awk/anchor bug in extract_openapi(), not real drift. Check that components.schemas.DenialReason exists at 4-space indentation in docs/spec/AEGIS_API_SPEC.yaml."
            exit 1
          fi

          # Engine is the canonical list (it's the only one whose source
          # we control byte-for-byte). Each other surface is allowed to
          # be a SUPERSET (vendors might pre-register future reasons), but
          # not a subset — every engine value must appear elsewhere.
          missing_in_verifier=$(comm -23 <(echo "$engine") <(echo "$verifier"))
          missing_in_openapi=$(comm -23 <(echo "$engine") <(echo "$openapi"))

          fail=0
          if [ -n "$missing_in_verifier" ]; then
            echo "::error::Verifier-rp is missing denial reasons: $missing_in_verifier"
            fail=1
          fi
          if [ -n "$missing_in_openapi" ]; then
            echo "::error::OpenAPI spec is missing denial reasons: $missing_in_openapi"
            fail=1
          fi
          exit $fail
