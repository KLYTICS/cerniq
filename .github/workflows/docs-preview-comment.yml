name: docs-preview-comment

# Posts a curated reviewer checklist to the PR for every docs-touching
# change. Pairs with the Vercel-bot preview-URL comment (Vercel posts that
# automatically once the project is connected); this workflow adds the
# AEGIS-specific verification points reviewers should walk before approving.

on:
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'docs/spec/AEGIS_API_SPEC.yaml'
      - 'packages/types/**'
      - '.github/workflows/docs-preview-comment.yml'

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- aegis-docs-preview -->'
      - name: Create or update reviewer checklist comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- aegis-docs-preview -->
            ### AEGIS Docs ┬Ę reviewer checklist

            Vercel posts a preview URL in its own comment on this PR.
            Walk this checklist against that URL before approving:

            **Live components ŌĆö every `data-source` attribute should read `api`, not `fallback`:**
            - [ ] `<PricingTable/>` on `/` and `/docs/api/billing` shows `data-source="api"`
            - [ ] `<StatusBadge/>` on `/docs/personas/sre` and `/docs/compliance/overview` shows operational status
            - [ ] `<JwksFingerprint/>` on `/docs/personas/auditor` shows live RFC 7638 thumbprints
            - [ ] `<SdkVersionBadges/>` shows current SDK versions (not "unreleased")

            **Wire-constant pages ŌĆö every row should match `packages/types/src/constants.ts`:**
            - [ ] `/docs/concepts/denial-precedence` shows 11 reasons in the correct order
            - [ ] `/docs/concepts/trust-bands` shows PLATINUM Ōēź 750 / VERIFIED Ōēź 500 / WATCH Ōēź 250 / FLAGGED Ōēź 0
            - [ ] `/docs/concepts/webhooks` shows all 5 `aegis.agent.*` events

            **Auto-generated reference ŌĆö should exist post-build:**
            - [ ] `/docs/api/(generated)/` populated (OpenAPI ŌåÆ Fumadocs)
            - [ ] `/docs/sdk/(generated)/typescript/` populated (TypeDoc ŌåÆ Markdown)

            **AI-crawler surface:**
            - [ ] `/llms.txt` returns a non-empty curated index
            - [ ] `/api/docs` returns JSON with `pages[]` populated
            - [ ] `/sitemap.xml` lists every page
            - [ ] `/robots.txt` references the sitemap

            **CI gates that must be green to merge:**
            - [ ] `docs` workflow (typecheck, parity, lychee link-check)
            - [ ] `lighthouse-docs` workflow (perf Ōēź 0.85, a11y Ōēź 0.95, best-practices Ōēź 0.9, SEO Ōēź 0.95)

            **Visual smoke:**
            - [ ] Search works (top-bar input; `/api/search` returns hits)
            - [ ] OG image renders (drag the preview URL into a Slack DM or use [opengraph.xyz](https://www.opengraph.xyz/) ŌĆö should show the aurora-gradient AEGIS card)
            - [ ] 404 page is on-brand (visit any non-existent URL)
