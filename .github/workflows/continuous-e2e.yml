name: Continuous E2E (staging funnel)

# Drives the AEGIS paying-customer funnel against staging every 15 minutes.
# This is the "is the product working for real users right now" gate. On
# failure, posts to the page-webhook configured at secrets.E2E_PAGE_WEBHOOK_URL.
# On success, appends the structured run report to the gh-pages branch under
# status/runs/<date>/<run-id>.json so we have a public history.
#
# Skip semantics: the spec exits green with a "skipped: <reason>" log when
# AEGIS_E2E_BASE_URL or E2E_BOOTSTRAP_API_KEY are missing or the API is
# unreachable. Misconfiguration is NOT a page; only real funnel failures are.
#
# Secrets required (OPERATOR-INPUT-NEEDED — see tests/e2e-continuous/README.md):
#   AEGIS_E2E_BASE_URL          staging API base (e.g. https://api.staging.aegislabs.io)
#   AEGIS_E2E_LANDING_URL       (optional) marketing/docs origin if different from API
#   E2E_BOOTSTRAP_API_KEY       management key bound to a dedicated e2e-continuous principal
#   E2E_PAGE_WEBHOOK_URL        webhook called with run-report JSON on failure
#
# Optional (set only on the dedicated daily probe job):
#   E2E_RUN_TRIAL_EXHAUSTION    'true' to enable the trial-exhaustion step
#   E2E_TRIAL_CAP_OVERRIDE      integer cap (1..50) matching the API env

on:
  schedule:
    # Every 15 minutes. Five offset to avoid the :00 hour spike on shared runners.
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
    inputs:
      run_trial_exhaustion:
        description: 'Run the trial-exhausted gate step (slow, requires cap override)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  # Never overlap runs — the synthetic principal would race against itself.
  group: continuous-e2e
  cancel-in-progress: false

permissions:
  contents: write  # to push run reports to gh-pages

jobs:
  funnel:
    name: Funnel probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      overall: ${{ steps.run.outputs.overall }}
      report_path: ${{ steps.run.outputs.report_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # Continuous-e2e links to in-tree packages (sdk-ts, types, verifier-rp)
        # so a full monorepo install is the safest option; the dedicated
        # filter targets only the workspaces we need.
        run: pnpm install --frozen-lockfile --filter @aegis/e2e-continuous... --filter @aegis/sdk... --filter @aegis/verifier-rp...

      - name: Run funnel
        id: run
        env:
          AEGIS_E2E_BASE_URL: ${{ secrets.AEGIS_E2E_BASE_URL }}
          AEGIS_E2E_LANDING_URL: ${{ secrets.AEGIS_E2E_LANDING_URL }}
          E2E_BOOTSTRAP_API_KEY: ${{ secrets.E2E_BOOTSTRAP_API_KEY }}
          E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          E2E_RUN_TRIAL_EXHAUSTION: ${{ github.event.inputs.run_trial_exhaustion || 'false' }}
          E2E_TRIAL_CAP_OVERRIDE: ${{ secrets.E2E_TRIAL_CAP_OVERRIDE }}
        run: |
          set -o pipefail
          mkdir -p .e2e-out
          # Capture the full vitest stdout. The spec's afterAll emits a sentinel
          # line; run-report.ts pulls it out into canonical JSON. Tee preserves
          # the human-readable log in the Actions UI.
          pnpm --filter @aegis/e2e-continuous test \
            | tee .e2e-out/vitest.log
          test_exit=${PIPESTATUS[0]}

          # Always try to extract a report, even when vitest failed — the
          # afterAll hook still runs on a failed test and emits the sentinel.
          if ! pnpm --filter @aegis/e2e-continuous exec tsx run-report.ts \
                < .e2e-out/vitest.log > .e2e-out/report.json; then
            echo "::warning::no run-report sentinel found"
            echo "overall=missing-report" >> "$GITHUB_OUTPUT"
            echo "report_path=" >> "$GITHUB_OUTPUT"
            exit ${test_exit:-1}
          fi

          overall=$(node -e "console.log(require('./.e2e-out/report.json').overall)")
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          echo "report_path=.e2e-out/report.json" >> "$GITHUB_OUTPUT"
          # Reflect vitest's exit code: a real funnel failure must fail the job
          # so the page-on-failure step fires.
          exit "$test_exit"

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-continuous-${{ github.run_id }}-${{ github.run_attempt }}
          path: .e2e-out/
          retention-days: 14

  publish-report:
    name: Publish report to gh-pages
    runs-on: ubuntu-latest
    needs: funnel
    if: needs.funnel.result == 'success' || needs.funnel.result == 'failure'
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          # OPERATOR-INPUT-NEEDED: if gh-pages doesn't exist yet, create it
          # as an orphan branch manually:
          #   git checkout --orphan gh-pages && git rm -rf . && \
          #   git commit --allow-empty -m "init gh-pages" && git push origin gh-pages
          # Once it exists, this step keeps appending.
        continue-on-error: true

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: e2e-continuous-${{ github.run_id }}-${{ github.run_attempt }}
          path: .e2e-out/

      - name: Append run to history
        run: |
          set -euo pipefail
          if [ ! -f .e2e-out/report.json ]; then
            echo "::warning::no report.json to publish — skipping"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          DEST_DIR="status/runs/$DATE"
          mkdir -p "$DEST_DIR"
          cp .e2e-out/report.json "$DEST_DIR/${{ github.run_id }}-${{ github.run_attempt }}.json"
          git config user.name "aegis-bot"
          git config user.email "bot@aegislabs.io"
          git add "$DEST_DIR" || true
          git commit -m "chore(e2e-continuous): append run ${{ github.run_id }} ($(node -e "console.log(require('./.e2e-out/report.json').overall)"))" || {
            echo "nothing to commit"
            exit 0
          }
          git push origin gh-pages

  page-on-failure:
    name: Page operator
    runs-on: ubuntu-latest
    needs: funnel
    if: needs.funnel.result == 'failure'
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: e2e-continuous-${{ github.run_id }}-${{ github.run_attempt }}
          path: .e2e-out/

      - name: Post to page webhook
        env:
          PAGE_WEBHOOK_URL: ${{ secrets.E2E_PAGE_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${PAGE_WEBHOOK_URL}" ]; then
            echo "::warning::E2E_PAGE_WEBHOOK_URL not set — cannot page"
            exit 0
          fi
          if [ -f .e2e-out/report.json ]; then
            REPORT=$(cat .e2e-out/report.json)
          else
            REPORT='{"overall":"unknown","steps":[]}'
          fi
          # Compact payload — the webhook receiver decides how to render.
          # Includes the run URL so on-call can jump straight to the log.
          payload=$(jq -n \
            --arg run_url "$RUN_URL" \
            --argjson report "$REPORT" \
            '{event:"aegis.e2e_continuous.failed", run_url:$run_url, report:$report}')
          curl --silent --show-error --fail \
            -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$PAGE_WEBHOOK_URL"
