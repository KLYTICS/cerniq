# Software Bill of Materials (SBOM) generation.
# SOC2 Type II asks for a current SBOM. Customers in regulated verticals
# (cooperativas, fintech, healthcare) ask for the same. This produces an
# SPDX 2.3 + CycloneDX 1.6 SBOM for every release tag and every push to
# main, attaches them as build artifacts, and uploads to the GitHub
# dependency-graph (so Dependabot can correlate vulns).

name: SBOM

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        # `--ignore-npm-errors` skips packages whose transitive metadata
        # is malformed (e.g. printable-characters@1.0.42 declares missing
        # legacy babel/mocha/coveralls peers it doesn't actually need at
        # runtime). Without this flag, npm-ls fails the entire SBOM
        # generation on those metadata gaps even though the production
        # tree is intact. The fallback Syft SPDX scan below (anchore/
        # sbom-action) is a second independent generator that catches
        # anything CycloneDX might skip.
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file cerniq.cyclonedx.json \
            --spec-version 1.6 \
            --gather-license-texts \
            --ignore-npm-errors

      - name: Generate SPDX SBOM via Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: cerniq.spdx.json
          upload-artifact: false

      - name: Generate Syft CycloneDX (for parity check)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: cerniq.syft.cyclonedx.json
          upload-artifact: false

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cerniq-sbom-${{ github.sha }}
          path: |
            cerniq.cyclonedx.json
            cerniq.spdx.json
            cerniq.syft.cyclonedx.json
          retention-days: 90
          if-no-files-found: error

      - name: Upload SBOM to GitHub dependency graph
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: 'cerniq.spdx.json'

      - name: Attest build provenance for SBOMs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            cerniq.cyclonedx.json
            cerniq.spdx.json

  vulnerability-scan:
    needs: build-sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: cerniq-sbom-${{ github.sha }}

      - name: Run Grype against SBOM
        # anchore/scan-action@v5 emitted SARIF with results missing
        # artifactLocation, which GitHub Code Scanning rejects as malformed
        # (errored 21x with `expected artifact location` on b6390c7). v7
        # standardizes the SARIF locations against the GitHub schema.
        uses: anchore/scan-action@v7
        id: grype
        with:
          sbom: cerniq.spdx.json
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype findings to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.grype.outputs.sarif != ''
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-sbom
