name: mirror-from-radicle

# Pulls the latest signed state from the Radicle canonical and propagates
# the refs allowed by scripts/mirror-policy.sh out to this GitHub repo.
#
# Radicle (rad:z3JUSaS2iRrV1raoSaqXxowLDHq6b) is canonical; this workflow
# makes GitHub a verified mirror.
#
# Propagation strategy (2026-05-27, see mirror push step for full rationale):
#   - Tags          → direct force-push (not protected; no CI gate)
#   - refs/heads/main → push to `radicle-sync/main` + open/update PR
#                     into protected `main`, so CodeQL/gitleaks/doctor/
#                     parity gates run on every Radicle landing.
#
# Mirror cadence: manual `workflow_dispatch` only. The every-15-min cron
# was removed (2026-05-30) — failing scheduled runs emailed the maintainer
# on every interval, and the mirror's prerequisites (Radicle seeder
# reachability from CI) were not reliably met. Trigger a sync on demand,
# or re-add a `schedule:` block once the mirror runs green unattended.
# Latency is then operator-driven for the sync branch + PR review/merge
# cycle for `main`. Acceptable because GitHub is a verified view, not the
# source of truth.

on:
  workflow_dispatch: # manual trigger for ad-hoc syncs

concurrency:
  group: mirror-from-radicle
  cancel-in-progress: true

permissions:
  contents: write # push tags + sync branch
  pull-requests: write # open / update the radicle-sync → main mirror PR

env:
  # Pin Radicle to a known-good release. Bump deliberately; do not float.
  RAD_VERSION: '1.9.1'
  CERNIQ_RID: 'rad:z3JUSaS2iRrV1raoSaqXxowLDHq6b'

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # we need full history for the mirror push

      - name: Install Radicle CLI (pinned binary)
        # Prior attempt used `curl -sSf https://radicle.xyz/install | sh` —
        # that URL serves an HTML install page, not a shell script, so the
        # pipe to `sh` crashed with "cannot open html". We download the
        # binary tarball directly from Radicle's release CDN instead.
        # The version is pinned via the workflow-level env above so an
        # upstream change can't silently break this job.
        run: |
          set -euo pipefail
          cd /tmp
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  RAD_ARCH='x86_64-unknown-linux-musl' ;;
            aarch64) RAD_ARCH='aarch64-unknown-linux-musl' ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          URL="https://files.radicle.xyz/releases/${RAD_VERSION}/radicle-${RAD_VERSION}-${RAD_ARCH}.tar.xz"
          echo "downloading $URL"
          curl -fsSL "$URL" -o radicle.tar.xz
          tar -xJf radicle.tar.xz
          sudo cp radicle-*/bin/* /usr/local/bin/
          rad --version

      - name: Mint ephemeral Radicle identity (CI-only)
        # `rad clone` needs a running node, and the node needs an identity.
        # We mint a throwaway one with an empty passphrase — it never signs
        # anything outbound (we only PULL from the network), so this is
        # acceptable hygiene for a CI mirror context. The identity dies
        # with the runner.
        env:
          RAD_PASSPHRASE: ''
        run: |
          rad auth --alias cerniq-mirror-ci
          rad self

      - name: Start Radicle node
        run: |
          rad node start
          # Give the node a moment to connect to public seeders
          # so `rad clone` finds replicas of the project.
          for i in 1 2 3 4 5; do
            if rad node status 2>&1 | grep -q "Node is running"; then
              break
            fi
            sleep 2
          done
          rad node status | head -10 || true

      # Clone with retry on transient seed unavailability.
      #
      # Radicle is a P2P network; seed availability fluctuates by minute.
      # A cron tick that hits a 1–2 minute "no reachable seeds" window
      # was previously a hard workflow failure — observed concretely on
      # 2026-05-27T16:05Z scheduled run #26523126687, while the manual
      # workflow_dispatch on the same SHA at 14:02Z succeeded. That's
      # not a workflow bug; it's the P2P substrate doing its thing.
      #
      # Strategy: up to 3 clone attempts with exponential backoff
      # (30s/60s/120s = ~3.5 min wall-clock cap). If all 3 hit the
      # specific "no seeds found" pattern, downgrade to a workflow
      # `::notice::` and emit `skipped=true` so downstream steps short-
      # circuit cleanly — the next 15-min cron tick will retry anyway,
      # so a missed run is not actionable. ANY OTHER clone failure
      # (missing binary, identity error, signature rejection, malformed
      # RID) still hard-fails. We narrow the green-pass to one specific
      # known-transient signal; everything else stays loud. Mirrors the
      # audit-chain self-skip pattern (3d4059d) for the same reason:
      # "no silent failures, but don't shout about non-actionable
      # transients" (CLAUDE.md invariant #4).
      - name: Clone canonical from Radicle network (with retry on transient seed unavailability)
        id: clone
        env:
          RAD_PASSPHRASE: ''
        run: |
          set -euo pipefail

          attempts=3
          backoff=30

          for i in $(seq 1 $attempts); do
            echo "::group::clone attempt $i/$attempts"

            clone_log=$(mktemp)
            # Don't let set -e kill us mid-retry; capture the exit code instead.
            set +e
            rad clone "$CERNIQ_RID" --no-confirm canonical 2>&1 | tee "$clone_log"
            clone_rc=${PIPESTATUS[0]}
            set -e

            if [[ $clone_rc -eq 0 ]]; then
              echo "::endgroup::"
              echo "✓ clone succeeded on attempt $i/$attempts"
              cd canonical
              git fetch --all --tags
              echo "---refs available---"
              git for-each-ref --format='%(refname)' refs/heads refs/tags | head -20
              echo "skipped=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::endgroup::"

            if ! grep -q "no seeds found" "$clone_log"; then
              echo "::error title=Clone failed (non-retryable)::Clone exited $clone_rc with an unexpected error. Last lines of clone log:"
              tail -20 "$clone_log"
              exit 1
            fi

            if [[ $i -lt $attempts ]]; then
              echo "::warning title=Transient: no seeds::Attempt $i/$attempts hit 'no seeds found' for $CERNIQ_RID — retrying in ${backoff}s after resetting Radicle node state."
              rad node stop >/dev/null 2>&1 || true
              sleep "$backoff"
              rad node start
              # Re-await node readiness before the next clone attempt.
              for _ in 1 2 3 4 5; do
                if rad node status 2>&1 | grep -q "Node is running"; then
                  break
                fi
                sleep 2
              done
              # `rad clone` refuses to clone into a non-empty directory;
              # remove the partial dir before retrying.
              rm -rf canonical
              backoff=$((backoff * 2))
            fi
          done

          # All attempts exhausted on the retryable pattern → soft-fail.
          echo "::notice title=Mirror skipped (transient)::All $attempts clone attempts failed with 'no seeds found' for $CERNIQ_RID. The Radicle network had no reachable seeds during this cron window. The next cron run (in ≤15 min) will retry; this run is not actionable."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Stage policy script
        if: steps.clone.outputs.skipped != 'true'
        working-directory: canonical
        run: cp scripts/mirror-policy.sh /tmp/mirror-policy.sh && chmod +x /tmp/mirror-policy.sh

      - name: Discover mirrorable refs
        if: steps.clone.outputs.skipped != 'true'
        working-directory: canonical
        id: refs
        run: |
          git for-each-ref --format='%(refname)' refs/heads refs/tags \
            | /tmp/mirror-policy.sh \
            | tee /tmp/decisions.txt
          grep '^mirror ' /tmp/decisions.txt | awk '{print $2}' > /tmp/to-mirror.txt
          echo "count=$(wc -l < /tmp/to-mirror.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      # Mirror push step. GitHub `main` is branch-protected (per ENG-OPS
      # decision 2026-05-26: protection is mandatory because CI gates —
      # CodeQL, gitleaks, doctor:full — must run on everything that lands
      # on main). The mirror cannot force-push to main directly without
      # bypassing those gates, which would defeat the protection's purpose.
      #
      # Operator decision (2026-05-27, this PR): use a **PR-based mirror**.
      #   - Tags: still force-pushed directly (not protected; CI gates do
      #     not gate tag refs).
      #   - main:   pushed to `radicle-sync/main` (a derivative ref) and
      #             surfaced via an auto-opening PR. The PR carries the
      #             new Radicle commits through CI gates before merging
      #             into the protected `main`.
      #
      # The architectural invariant stands: Radicle is canonical. GitHub
      # `main` is a verified mirror, just one that earns CI green before
      # accepting Radicle's commits. Mirror latency is bounded by how
      # often the sync is dispatched + the PR review cycle.
      #
      # Divergence handling: if a human or another bot has pushed
      # something to GitHub main that isn't on Radicle, opening a PR
      # would propose *deleting* those commits. We detect this with
      # `git merge-base --is-ancestor` and refuse to open a PR in the
      # diverged case — operator must reconcile manually. This is the
      # CLAUDE.md "no silent failures" invariant: we surface the
      # divergence as a workflow warning rather than papering over it.
      - name: Mirror tags + open/update main mirror PR
        # Belt-and-suspenders guard: skip if clone soft-failed (refs step
        # didn't run, so its `count` output is unset — `!= '0'` would
        # spuriously evaluate true on an empty string). The explicit
        # `clone.outputs.skipped != 'true'` short-circuits that case.
        if: steps.clone.outputs.skipped != 'true' && steps.refs.outputs.count != '0'
        working-directory: canonical
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SYNC_BRANCH: radicle-sync/main
        run: |
          set -euo pipefail

          git remote add gh "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          main_changed=0

          while read -r ref; do
            case "$ref" in
              refs/heads/main)
                echo "::group::main → ${SYNC_BRANCH} (PR-based)"

                # Always force-push the canonical main onto the sync
                # branch. `radicle-sync/main` is a derivative ref — it
                # is not branch-protected, and force-update is correct
                # because we're literally replaying Radicle's history.
                git push --force gh "refs/heads/main:refs/heads/${SYNC_BRANCH}"

                # Compare Radicle main vs GitHub main to decide whether
                # an open PR is needed.
                git fetch gh main 2>/dev/null || true
                gh_sha=$(git rev-parse FETCH_HEAD 2>/dev/null || echo '')
                rad_sha=$(git rev-parse refs/heads/main)

                if [[ -z "$gh_sha" ]]; then
                  echo "GitHub main not present yet — will open initial mirror PR"
                  main_changed=1
                elif [[ "$gh_sha" == "$rad_sha" ]]; then
                  echo "Radicle main matches GitHub main — no PR needed"
                elif git merge-base --is-ancestor "$gh_sha" "$rad_sha" 2>/dev/null; then
                  ahead=$(git rev-list --count "${gh_sha}..${rad_sha}")
                  echo "Radicle main is ${ahead} commits ahead of GitHub main — PR will be opened/updated"
                  main_changed=1
                else
                  # Diverged: gh main has commits Radicle doesn't.
                  # Opening a PR would propose removing them. Refuse;
                  # surface a clear warning for operator triage.
                  echo "::warning title=Mirror divergence::GitHub main ($gh_sha) and Radicle main ($rad_sha) have diverged. The mirror cannot fast-forward; an operator must reconcile (either rebase Radicle onto gh main, or cherry-pick the gh-only commits back to Radicle)."
                fi

                echo "::endgroup::"
                ;;

              refs/tags/*)
                # Tags are not protected and have no CI gate dependency;
                # direct force-push preserves the existing behavior.
                echo "mirroring tag $ref"
                git push --force gh "$ref:$ref"
                ;;

              *)
                # Future-proof: if mirror-policy.sh broadens the allowlist
                # beyond main+tags, anything else falls through here as a
                # direct force-push. Revisit if a non-main, non-tag ref
                # ever becomes protected.
                echo "mirroring $ref (passthrough)"
                git push --force gh "$ref:$ref"
                ;;
            esac
          done < /tmp/to-mirror.txt

          # Open or update the mirror PR if main moved forward.
          if [[ "$main_changed" == "1" ]]; then
            existing_pr=$(gh pr list \
              --repo "$REPO" \
              --head "$SYNC_BRANCH" \
              --base main \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [[ -n "$existing_pr" ]]; then
              # GitHub auto-updates the PR head when the branch ref moves,
              # so we don't need to touch the PR itself. Just announce.
              echo "::notice::Existing mirror PR #${existing_pr} auto-updated with new Radicle commits."
            else
              new_short=$(git rev-parse --short refs/heads/main)
              echo "Opening new mirror PR at ${new_short}"
              gh pr create \
                --repo "$REPO" \
                --base main \
                --head "$SYNC_BRANCH" \
                --title "mirror: Radicle main → GitHub main @ ${new_short}" \
                --body-file - <<'PRBODY'
          Automated mirror PR from the Radicle canonical (`rad:z3JUSaS2iRrV1raoSaqXxowLDHq6b`).

          ## Why this PR exists

          GitHub `main` is branch-protected so CI gates (CodeQL, gitleaks, doctor:full, parity) run on every change. The Radicle canonical is the source of truth, but it cannot force-push through the protection without bypassing those gates — which would defeat the protection's purpose.

          This PR is the merge handle. Radicle's commits flow into `radicle-sync/main` whenever `mirror-from-radicle.yml` is dispatched, and that branch is the head of this PR. CI gates run on the PR; merging it advances GitHub `main` to match Radicle `main`.

          ## What you should do

          1. Wait for CI gates to go green on this PR.
          2. Review the diff like any other PR — the commits originate on Radicle but the same content lands here.
          3. Use **squash merge** to keep `main` history linear, or **merge commit** if you want a per-sync record (operator preference).
          4. After merge, `radicle-sync/main` will continue to receive new commits; a fresh PR will auto-open when the next sync diverges from `main`.

          ## If CI fails on this PR

          The break occurred on Radicle. Fix on Radicle, push the fix, and the next dispatched sync will update this PR's head. **Do not push commits directly to `radicle-sync/main`** — they will be overwritten on the next mirror run.

          > Opened by `.github/workflows/mirror-from-radicle.yml`. Trigger: manual `workflow_dispatch`.
          PRBODY
            fi
          fi

      - name: Stop Radicle node
        if: always()
        run: rad node stop || true
