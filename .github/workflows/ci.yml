name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_test?schema=public
      REDIS_URL: redis://localhost:6379
      API_KEY_BCRYPT_COST: '4'

    steps:
      - uses: actions/checkout@v4

      # pnpm version is sourced from `packageManager` in package.json.
      # Specifying `version:` here too errors with ERR_PNPM_BAD_PM_VERSION
      # in pnpm/action-setup@v4.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aegis/api prisma:generate

      - name: Apply Prisma migrations
        run: pnpm --filter @aegis/api prisma:deploy

      # Build the workspace packages whose `package.json` exports point
      # at `dist/` (e.g. @aegis/sdk, @aegis/types). Downstream consumers
      # like tools/quickstart and tests/ resolve them via npm's module
      # resolution, which requires the dist artifacts to exist before
      # `tsc --noEmit` runs. Filtered to the publish-shape packages so
      # we don't pay full-workspace build time twice (the `Build` step
      # at the end re-runs across everything).
      - name: Pre-build publish-shape packages
        run: pnpm --filter @aegis/types --filter @aegis/sdk --filter @aegis/audit-verifier build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
