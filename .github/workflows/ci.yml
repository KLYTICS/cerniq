name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cerniq
          POSTGRES_PASSWORD: cerniq
          POSTGRES_DB: cerniq_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U cerniq -d cerniq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://cerniq:cerniq@localhost:5432/cerniq_test?schema=public
      REDIS_URL: redis://localhost:6379
      API_KEY_BCRYPT_COST: '4'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cerniq/api prisma:generate

      - name: Apply Prisma migrations
        run: pnpm --filter @cerniq/api prisma:deploy

      - name: Build @cerniq/types (consumer dependency for lint/typecheck)
        # @cerniq/types publishes dist/*.d.ts via package.json `types`/`main`,
        # and ~every workspace consumer (sdk-ts, cli, mcp-server, postman,
        # verifier-rp, api, dashboard, etc.) imports from it via package
        # name resolution. Without this build, lint and typecheck across
        # multiple workspaces fail with:
        #   ERR_MODULE_NOT_FOUND: Cannot find module '.../@cerniq/types/dist/index.js'
        # The existing `Build` step at the end of this job produces these,
        # but consumers need them earlier. Limiting scope to @cerniq/types
        # (not all of packages/*) keeps this step fast and avoids coupling
        # to other packages' build health — building everything here would
        # turn unrelated package build failures into lint-step failures.
        run: pnpm --filter @cerniq/types build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
