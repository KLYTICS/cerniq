name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cerniq
          POSTGRES_PASSWORD: cerniq
          POSTGRES_DB: cerniq_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U cerniq -d cerniq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://cerniq:cerniq@localhost:5432/cerniq_test?schema=public
      REDIS_URL: redis://localhost:6379
      API_KEY_BCRYPT_COST: '4'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Doctor (preflight + invariant gates)
        # `pnpm doctor:full` is the canonical health check from CLAUDE.md.
        # It subsumes the two previous manual preflight steps:
        #   - prisma generate (apps/api)               — was an explicit step
        #   - @cerniq/types build for consumers        — was an explicit step
        # AND adds invariant assertions that the manual steps never gated:
        #   - denial-precedence chain (CLAUDE.md invariant 6) intact
        #   - error catalog TS/Py parity (R16/R17)
        #   - postman walkthrough vs. 10-step chain
        #   - discovery surface (.well-known/*) all present
        #   - peer-review regression guards (R19) intact
        #   - cross-package parity wired
        #
        # Net CI runtime impact: ~neutral (≈30s, vs ≈30s for the two steps
        # this replaces). Net assertion surface: much larger.
        #
        # `Apply Prisma migrations` below stays separate — doctor:full only
        # produces the client; applying migrations to the test DB is a
        # different concern.
        run: pnpm doctor:full

      - name: Apply Prisma migrations
        run: pnpm --filter @cerniq/api prisma:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
