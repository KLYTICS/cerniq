name: CLI — build, test, lint, snapshot

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - '.github/workflows/cli.yml'
      - '.goreleaser.yaml'
      - 'Makefile.cli'
  pull_request:
    paths:
      - 'packages/cli/**'
      - '.github/workflows/cli.yml'
      - '.goreleaser.yaml'

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/cli/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/cli/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: packages/cli
          args: --config=.golangci.yml --timeout=5m

  snapshot:
    name: goreleaser snapshot (cross-compile)
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/cli/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=publish,sign,sbom
      - name: list dist artifacts
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: okoro-cli-snapshot
          path: |
            dist/okoro_*
            dist/checksums.txt
          retention-days: 14
