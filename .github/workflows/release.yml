# Changesets-driven release for public packages (@aegis/sdk, @aegis/types).
# Runs on merge to main; opens a "Version Packages" PR with the version
# bumps + changelog entries. Merging that PR publishes to npm.
#
# Internal apps (api, dashboard, worker) are not released this way — they
# deploy on merge via Railway / Cloudflare.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: github.repository == 'klytics/aegis'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        # pnpm version is taken from root package.json "packageManager" field.
        # Specifying `version:` here would conflict per pnpm/action-setup v4.

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build SDK + types
        run: pnpm --filter '@aegis/types' --filter '@aegis/sdk' build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1 (2026-05-07)
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'release: version packages'
          title: 'release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
