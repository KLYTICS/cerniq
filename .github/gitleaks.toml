# gitleaks config for CERNIQ.
# Built on the default ruleset; only document the *additions* and
# *exceptions* below so the audit trail is clear.

title = "cerniq-gitleaks"
# inherit defaults
[extend]
useDefault = true

# ─────────────────────────────────────────────────────────────
# Project-specific allow-lists — false positives we accept.
# Each exception MUST cite a reason.
#
# Uses the plural `[[allowlists]]` form (gitleaks v8.18+) rather than
# the legacy singular `[allowlist]`. The plural form supports
# `targetRules` for per-rule scoping, which the entropy-fired
# `generic-api-key` default rule honors more reliably than the
# legacy top-level form — see Finding #4 of the PR #55 enterprise-
# readiness audit (docs/SESSION_HANDOFF.md 2026-05-24).
# ─────────────────────────────────────────────────────────────

# Block 1 — global allowlist (all rules). Path-scoped to docs / examples
# and documented placeholder patterns that are never real keys regardless
# of which rule fires.
[[allowlists]]
description = "Documented example tokens and placeholders (all rules)"
paths = [
    # Spec docs contain example tokens like "stripe_spt_xxx" that aren't real.
    '''docs/spec/.*''',
    # OPERATOR_DECISIONS.md and BATE_ALGORITHM.md may contain example weights/IDs.
    '''OPERATOR_DECISIONS\.md''',
    '''docs/BATE_ALGORITHM\.md''',
    # The .env.example file is the documented format; real values are in .env (ignored).
    '''\.env\.example''',
    # Example IDs in README + ARCHITECTURE.
    '''README\.md''',
    '''docs/ARCHITECTURE\.md''',
]
regexes = [
    # Documented placeholder formats — never real keys.
    '''agt_01[A-Z0-9]{24}''',         # example agentId in docs
    '''pol_01[A-Z0-9]{24}''',         # example policyId in docs
    '''stripe_spt_xxx''',             # spec example
    '''cerniq_signed_xxx''',           # spec example
]

# Block 2 — scoped to `generic-api-key`. The default rule fires on
# entropy alone, catching public-by-definition crypto identifiers as if
# they were API keys. These IDs are the cryptographic ANALOG of a domain
# name — they appear in audit-trail commits (NOTICE.md, SESSION_HANDOFF.md,
# decisions/) wherever we reference the Radicle canonical or a Radicle
# node DID. Per-rule targeting (`targetRules`) is honored more reliably
# than the legacy top-level allowlist regex for entropy-fired rules.
#
# Patterns match the SECRET (i.e. the captured value), not the full
# match string — gitleaks' allowlist `regexes` compare against the
# captured-group value by default. For a DID like
# `did:key:z6MktaWRHDtqf9WBqcuoM2u7Qq7Nq91zciw9xE5ib8JkN3EA` the captured
# secret is `z6Mkta...` only (the `did:key:` prefix is consumed by the
# `generic-api-key` rule itself). So the allowlist regex must match the
# multibase suffix without the URI scheme prefix.
[[allowlists]]
description = "Public crypto identifiers (W3C DIDs, Radicle RIDs) — entropy FPs on generic-api-key"
targetRules = ["generic-api-key"]
regexes = [
    '''z6Mk[1-9A-HJ-NP-Za-km-z]{40,50}''',  # W3C did:key (Ed25519) multibase
    '''z[1-9A-HJ-NP-Za-km-z]{30,}''',       # Radicle project ID (RID) multibase
]

# Block 3 — scoped to `generic-api-key` for the Railway service-manifest
# JSON files. These files enumerate env-var NAMES (e.g.
# `JWT_ED25519_PRIVATE_KEY_B64`) along with whether they're secret-tier
# and how to provision them — they DO NOT contain values. Gitleaks'
# entropy rule fires on the variable-name strings alone because
# mixed-case + digits + underscores meet the entropy threshold.
# Restricted to the infra/railway/*.json path so this allowlist cannot
# accidentally cover real secret leakage elsewhere. The project-specific
# `ed25519-private-seed` rule below still catches actual base64url-43
# values, so dropping VALUES in these files would still trip.
[[allowlists]]
description = "Railway env-var NAMES (not values) — generic-api-key entropy FPs in service manifests"
targetRules = ["generic-api-key"]
paths = [
    '''infra/railway/.*\.json''',
]

# Block 4 — scoped to `generic-api-key` for audit-trail / handoff docs.
# `NOTICE.md` cites the Radicle node DID that signed each release tag.
# `docs/SESSION_HANDOFF.md` is a long-running handoff log that references
# DIDs, RIDs, and env-var-NAME tokens (e.g. `_PRIVATE_KEY_B64`) in prose.
# Both files contain real audit-trail content where the patterns gitleaks
# entropy-flags are expected and intentional. Project-specific rules
# `cerniq-api-key`, `cerniq-verify-key`, and `ed25519-private-seed` still
# fire in these files — only the entropy-only `generic-api-key` default
# rule is silenced here. If a real cerniq_live_* key or a 43-char Ed25519
# seed ever appears in these files, the project-specific rules catch it.
[[allowlists]]
description = "Audit-trail docs — generic-api-key entropy FPs on env-var NAMEs / DIDs in prose"
targetRules = ["generic-api-key"]
paths = [
    '''NOTICE\.md''',
    '''docs/SESSION_HANDOFF\.md''',
]

# Block 5 — scoped to `generic-api-key` AND `jwt` for documentation,
# postman fixtures, and JWT-token generators. These files MUST carry
# example JWT-shaped strings (`eyJhbGci…`) to teach consumers what a
# real signed token looks like; the strings are static fixtures whose
# signatures don't verify against any real key. Path-scoped narrowly
# to documentation surfaces + Postman collections + the walkthrough
# generator. The cerniq-specific signing-key rules and the
# `ed25519-private-seed` rule still fire here, so any real key
# accidentally pasted into one of these files would still be caught.
[[allowlists]]
description = "JWT-shaped example tokens in docs / Postman fixtures / walkthrough generators"
targetRules = ["generic-api-key", "jwt"]
paths = [
    '''apps/docs/content/.*\.mdx''',
    '''docs/.*\.md''',
    '''scripts/generate-.*\.ts''',
    '''tools/postman/.*\.json''',
]

# Block 6 — scoped to `generic-api-key` for test files. Test fixtures
# routinely use deterministic IDs (ULIDs like `01HZ9YZXM4QT3B7P8WKJD6R5V`,
# variable-name strings like `priv_test_b64u`) that hit the entropy rule
# but are never real secrets. Standard test-file extensions only:
# `*.spec.ts`, `*.test.ts`, `tests/test_*.py`. The
# `ed25519-private-seed` rule still catches an actual 43-char base64url
# assignment to `_PRIVATE_KEY_B64`, so leaking a real seed into a test
# fixture would still trip.
[[allowlists]]
description = "Test fixtures (deterministic IDs / variable names) — generic-api-key entropy FPs"
targetRules = ["generic-api-key"]
paths = [
    '''.*\.spec\.ts''',
    '''.*\.test\.ts''',
    '''.*/tests/test_.*\.py''',
    '''packages/sdk-py/tests/.*\.py''',
]

# Block 7 — historical pre-rebrand artifact. The string
# `aegis-fapi-2.0-aligned-1.0` was a protocol-version constant in
# `apps/api/src/modules/wellknown/wellknown.service.ts` during the
# AEGIS era; the rebrand (commit 4403bba, 2026-05-22) removed it.
# Gitleaks scans full git history by default, so the old commit still
# shows up. Narrow regex-allowlist that matches just this one literal
# string keeps the silencing surgical — no surrounding code is
# allowlisted, so any future change at that file path remains fully
# scanned.
[[allowlists]]
description = "Historical AEGIS-era FAPI protocol version string (pre-rebrand artifact)"
targetRules = ["generic-api-key"]
regexes = [
    '''aegis-fapi-2\.0-aligned-1\.0''',
]

# Block 8 — example-code variable references. The `examples/` tree
# carries quickstart code that consumers copy verbatim; variable
# references like `args.privateKeyB64u` are property accesses in the
# example program (not secret values), but the entropy rule still
# fires on the mixed-case identifier. Path-scoped to `examples/` only.
[[allowlists]]
description = "Examples tree — generic-api-key entropy FPs on variable references"
targetRules = ["generic-api-key"]
paths = [
    '''examples/.*''',
]

# ─────────────────────────────────────────────────────────────
# Project-specific rules — extra patterns gitleaks default misses.
# ─────────────────────────────────────────────────────────────

[[rules]]
id = "cerniq-api-key"
description = "CERNIQ API key — full management"
regex = '''cerniq_(live|test)_[A-Za-z0-9]{32,}'''
keywords = ["cerniq_live_", "cerniq_test_"]

[[rules]]
id = "cerniq-verify-key"
description = "CERNIQ verify-only API key"
regex = '''cerniqv_(live|test)_[A-Za-z0-9]{32,}'''
keywords = ["cerniqv_live_", "cerniqv_test_"]

[[rules]]
id = "ed25519-private-seed"
description = "Possible Ed25519 32-byte seed (base64url, 43 chars) assigned to a *_PRIVATE_KEY_B64 variable"
regex = '''_PRIVATE_KEY_B64\s*[:=]\s*['"]?[A-Za-z0-9_-]{43}['"]?'''
keywords = ["_PRIVATE_KEY_B64"]
