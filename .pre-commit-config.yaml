# Cerniq pre-commit hooks.
#
# Run on `git commit` (after install) and in CI. The global pre-commit hook
# at ~/.config/git/hooks/pre-commit also runs gitleaks on staged content —
# this file gives us a versioned, reproducible scan that runs identically
# locally and in CI, and lets CI catch secrets even when contributors
# don't have the global hook installed.
#
# Install locally:  pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
