# golangci-lint config for the okoro CLI.
# Tightens past defaults to match CLAUDE.md quality bar:
#   - no any without rationale
#   - no silent error swallowing
#   - exhaustive switches on enum-like types
linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - misspell
    - unconvert
    - unparam
    - gofmt
    - goimports
linters-settings:
  goimports:
    local-prefixes: github.com/klytics/okoro
issues:
  exclude-use-default: false
  max-same-issues: 0
