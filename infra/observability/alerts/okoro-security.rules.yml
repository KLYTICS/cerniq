groups:
  # ──────────────────────────────────────────────────────────────────
  # Security alerts — paged immediately. Tighter SLOs than performance
  # because security incidents are bigger blast radius than latency.
  # ──────────────────────────────────────────────────────────────────
  - name: okoro_security
    interval: 30s
    rules:

      # ─── Authentication / authorization ────────────────────────────

      - alert: OKORO_API_KEY_FAILURE_SPIKE
        expr: |
          sum by (principal_id) (
            rate(okoro_verify_total{decision="DENIED",denial_reason="INVALID_SIGNATURE"}[5m])
          ) > 5
        for: 5m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Sustained INVALID_SIGNATURE spike — credential stuffing or noble-lib bug"
          runbook: "docs/SECURITY_RUNBOOK.md#authentication-failure-spike"
          description: |
            > 5 INVALID_SIGNATURE denials/sec for 5 min from principal {{ $labels.principal_id }}.
            Either an attacker is brute-forcing tokens, the noble-ed25519 lib has regressed,
            or a customer integration broke. Check logs for `JWT decode failed` patterns.

      - alert: OKORO_REPLAY_DETECTED
        expr: |
          sum(rate(okoro_verify_total{denial_reason="ANOMALY_FLAGGED"}[1m])) > 1
        for: 2m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Token replays detected — investigate immediately"
          runbook: "docs/SECURITY_RUNBOOK.md#token-replay-detected"
          description: |
            ANOMALY_FLAGGED denials > 1/sec for 2 min. The replay-cache is rejecting
            previously-consumed jti values. Either an attacker has captured a valid token
            stream OR the replay-cache Redis is unhealthy and we are fail-closed correctly.

      # ─── Cross-tenant attempts ───────────────────────────────────

      - alert: OKORO_CROSS_TENANT_ATTEMPT
        expr: |
          sum(rate(okoro_authorization_denied_total{reason="cross_tenant"}[5m])) > 0
        for: 1m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Cross-tenant access attempt — possible compromised key"
          runbook: "docs/SECURITY_RUNBOOK.md#cross-tenant-attempt"
          description: |
            An API key tried to access a resource owned by a different principal. The app-layer
            guard caught it (and Postgres RLS would have caught it again at the data layer).
            High likelihood of a compromised key — review audit log for the calling key.

      # ─── Audit chain integrity ────────────────────────────────────

      - alert: OKORO_AUDIT_APPEND_FAILURE_SPIKE
        expr: |
          sum(rate(okoro_audit_append_total{result="error"}[5m])) > 0.1
        for: 5m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Audit chain append failures — compliance evidence at risk"
          runbook: "docs/SECURITY_RUNBOOK.md#audit-append-failures"
          description: |
            Audit appends are failing > 0.1/sec for 5 min. Every gap is a compliance
            event we cannot reconstruct from logs. Likely causes: Postgres advisory-lock
            contention, signing-key unset, or schema drift. The verify path falls
            through with auditEventId=null on these — check rate of null auditEventIds
            in /v1/verify responses.

      # ─── Cache health (silent-failure invariant) ─────────────────

      - alert: OKORO_CACHE_SET_FAILURE_SPIKE
        expr: |
          sum by (op) (rate(okoro_cache_set_failed_total[5m])) > 1
        for: 5m
        labels:
          severity: warn
          team: security
          domain: okoro
        annotations:
          summary: "Cache writes silently failing — Redis incident piling DB load"
          runbook: "docs/SECURITY_RUNBOOK.md#cache-write-failure"
          description: |
            Best-effort cache writes failing > 1/sec for 5 min on op={{ $labels.op }}.
            Verify path will start hitting Postgres on every call, latency degrades.
            Check Redis instance health; consider rate-limiting verify if DB saturates.

      # ─── Replay cache (the lock on the Redis door) ───────────────

      - alert: OKORO_REPLAY_CACHE_FAIL_CLOSED
        expr: |
          sum(rate(okoro_verify_total{decision="DENIED",denial_reason="ANOMALY_FLAGGED"}[1m]))
          > 10
        for: 2m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Replay cache fail-closed — likely Redis outage in critical path"
          runbook: "docs/SECURITY_RUNBOOK.md#replay-cache-outage"
          description: |
            > 10 ANOMALY_FLAGGED/sec for 2 min — replay-cache.service.ts is throwing
            ServiceUnavailableError, fail-closing every verify. This is correct behavior
            (we refuse rather than approve under uncertainty) but the customer impact
            is total verify outage. Restore Redis IMMEDIATELY.

      # ─── Spend guard (financial counter) ─────────────────────────

      - alert: OKORO_SPEND_GUARD_UNAVAILABLE
        expr: |
          sum(rate(okoro_spend_guard_unavailable_total[5m])) > 0.5
        for: 5m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Spend guard fail-closed — financial counter degraded"
          runbook: "docs/SECURITY_RUNBOOK.md#spend-guard-outage"
          description: |
            SpendGuardService can't reach Redis OR Postgres for spend lookups > 0.5/sec
            for 5 min. Verify is correctly denying SPEND_LIMIT_EXCEEDED for any
            commerce request. Customers cannot transact. Restore data layer.

      # ─── Webhook delivery integrity ──────────────────────────────

      - alert: OKORO_WEBHOOK_DELIVERY_DLQ_FILL
        expr: |
          sum(rate(okoro_webhook_delivery_total{status="dead_letter"}[15m])) > 0.05
        for: 15m
        labels:
          severity: warn
          team: security
          domain: okoro
        annotations:
          summary: "Webhook DLQ filling — subscribers not receiving events"
          runbook: "docs/SECURITY_RUNBOOK.md#webhook-dlq"
          description: |
            > 0.05 dead-lettered deliveries/sec for 15 min. Subscribers won't see
            trust-score changes / anomaly events. Check WebhookDelivery rows with
            status=ABANDONED for the failing event types.

      # ─── Cryptographic primitives ────────────────────────────────

      - alert: OKORO_AUDIT_SIGNING_KEY_MISSING
        expr: |
          okoro_signing_key_loaded{type="audit"} == 0
        for: 1m
        labels:
          severity: page
          team: security
          domain: okoro
        annotations:
          summary: "Audit signing key not loaded — chain writes will fail"
          runbook: "docs/SECURITY_RUNBOOK.md#signing-key-not-loaded"
          description: |
            The audit signing key has not been loaded into the running process.
            All audit writes will throw. Check OKORO_SIGNING_PRIVATE_KEY env var,
            JWKS endpoint, and config.service boot output.

      - alert: OKORO_SIGNING_KEY_NEAR_ROTATION
        expr: |
          (time() - okoro_signing_key_age_seconds{type="audit"}) > 60 * 24 * 60 * 60
        for: 1h
        labels:
          severity: warn
          team: security
          domain: okoro
        annotations:
          summary: "Audit signing key > 60 days old — schedule rotation"
          runbook: "docs/SECURITY_RUNBOOK.md#signing-key-rotation"
          description: |
            The audit signing key has been in use > 60 days. Schedule rotation
            before 90 days (industry standard for high-value signing keys).

      # ─── DoS / abuse ─────────────────────────────────────────────

      - alert: OKORO_RATE_LIMIT_HEAVY
        expr: |
          sum by (route) (rate(okoro_http_requests_total{status_class="4xx"}[5m]))
            / sum by (route) (rate(okoro_http_requests_total[5m]))
          > 0.5
        for: 10m
        labels:
          severity: warn
          team: security
          domain: okoro
        annotations:
          summary: "More than half of {{ $labels.route }} traffic is 4xx — likely abuse or broken integration"
          runbook: "docs/SECURITY_RUNBOOK.md#rate-limit-heavy"
          description: |
            > 50% of requests on {{ $labels.route }} are 4xx for 10 min. Either an
            integration is broken or someone's brute-forcing. Check IP distribution
            in access logs; consider tightening throttler.
