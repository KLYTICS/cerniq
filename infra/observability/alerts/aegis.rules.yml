# AEGIS — Prometheus rule groups
#
# Single source of truth for alerting + recording rules. Loaded by
# Prometheus via `rule_files: ["aegis.rules.yml"]`. Alertmanager routes
# everything labelled `team: aegis-oncall`; severity drives PagerDuty
# escalation policy (see infra/observability/runbooks/README.md § SLAs).
#
# Authoring rules:
#   1. Every alert has a paired runbook in infra/observability/runbooks/.
#   2. Every metric referenced here exists in
#      apps/api/src/common/observability/metrics.service.ts. Metrics that
#      do *not* yet exist are flagged inline and pinned to `vector(0)` so
#      they never fire — DO NOT replace with fabricated metric names.
#   3. PromQL is evaluated mentally before commit. No `rate()` over
#      counters that aren't `_total`. No `histogram_quantile()` without
#      `sum by (le)`.
#
# Cross-checked against metrics.service.ts on 2026-05-01:
#   present: aegis_verify_latency_seconds (Histogram, label=decision)
#   present: aegis_verify_total{decision, denial_reason}
#   present: aegis_audit_append_total{result}    # result ∈ {ok, error}
#   present: aegis_webhook_delivery_total{status, event}
#   present: aegis_http_requests_total{method, route, status_class}
#   present: aegis_bate_score_delta{signal_type} (Histogram)
#   present: aegis_nodejs_eventloop_lag_seconds  # default Node metric, prefix=aegis_
#   MISSING: aegis_bate_queue_oldest_job_age_seconds  # tracked: M-007 follow-up
#   MISSING: aegis_bate_signals_total                  # tracked: M-007 follow-up
#   MISSING: redis_keyspace_hits_total / _misses_total # requires redis_exporter sidecar — tracked: M-019
#
# Drift note: the Grafana dashboard at infra/observability/grafana-dashboards/
# aegis-verify-latency.json references aegis_verify_denials_total,
# aegis_bate_recompute_lag_seconds_bucket, aegis_bullmq_waiting_jobs,
# aegis_cache_hits_total, aegis_cache_misses_total — none exist in the
# emitter. Code wins. Dashboard is wrong. Do NOT mirror its names here.

groups:
  # ---------------------------------------------------------------------------
  # Recording rules — pre-aggregated SLI series reused by burn-rate alerts.
  # Compute once here; alerts read the named series. Avoids re-deriving the
  # same expression in three places and going subtly out of sync.
  # ---------------------------------------------------------------------------
  - name: aegis.recording
    interval: 30s
    rules:
      - record: job:aegis_verify_latency_seconds:p99_5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(aegis_verify_latency_seconds_bucket[5m]))
          )

      # Verify success rate excludes legitimate revocations from the failure
      # numerator. AGENT_REVOKED / POLICY_REVOKED / POLICY_EXPIRED are
      # *correct* denials, not service errors — they shouldn't burn budget.
      - record: job:aegis_verify_success_ratio:5m
        expr: |
          (
            sum(rate(aegis_verify_total{decision="approved"}[5m]))
            +
            sum(rate(aegis_verify_total{decision="denied",denial_reason=~"AGENT_REVOKED|POLICY_REVOKED|POLICY_EXPIRED"}[5m]))
          )
          /
          clamp_min(sum(rate(aegis_verify_total[5m])), 0.001)

      - record: job:aegis_verify_success_ratio:1h
        expr: |
          (
            sum(rate(aegis_verify_total{decision="approved"}[1h]))
            +
            sum(rate(aegis_verify_total{decision="denied",denial_reason=~"AGENT_REVOKED|POLICY_REVOKED|POLICY_EXPIRED"}[1h]))
          )
          /
          clamp_min(sum(rate(aegis_verify_total[1h])), 0.001)

      - record: job:aegis_verify_success_ratio:6h
        expr: |
          (
            sum(rate(aegis_verify_total{decision="approved"}[6h]))
            +
            sum(rate(aegis_verify_total{decision="denied",denial_reason=~"AGENT_REVOKED|POLICY_REVOKED|POLICY_EXPIRED"}[6h]))
          )
          /
          clamp_min(sum(rate(aegis_verify_total[6h])), 0.001)

  # ---------------------------------------------------------------------------
  # aegis.verify.slo — the customer-facing contract. Latency + budget burn.
  # SLO source: docs/SLO.md § 1 (p99 < 200 ms, 99.95% success, 30d window).
  # ---------------------------------------------------------------------------
  - name: aegis.verify.slo
    interval: 30s
    rules:
      - alert: VerifyLatencyP99SLOBreach
        expr: job:aegis_verify_latency_seconds:p99_5m > 0.2
        for: 5m
        labels:
          severity: critical
          team: aegis-oncall
          surface: verify
          slo: latency
        annotations:
          summary: "Verify p99 latency > 200ms — customer-facing SLO breached"
          runbook: infra/observability/runbooks/verify-latency-slo-breach.md
          runbook_url: https://docs.aegislabs.io/runbooks/verify-latency-slo-breach
          description: |
            /v1/verify p99 latency is {{ $value | humanizeDuration }} over the last 5 min,
            above the 200 ms origin SLO (docs/SLO.md § 1). At this latency, relying-party
            agents are missing their own deadlines and we are actively burning the 30d
            error budget at >2x rate.

            First action: open the AEGIS Verify SLO Grafana dashboard and confirm whether
            the regression is global, per-route, or per-decision. Then follow the runbook.

      - alert: VerifyLatencyP99SLOWarning
        expr: job:aegis_verify_latency_seconds:p99_5m > 0.15
        for: 10m
        labels:
          severity: warning
          team: aegis-oncall
          surface: verify
          slo: latency
        annotations:
          summary: "Verify p99 latency > 150ms — approaching SLO threshold"
          runbook: infra/observability/runbooks/verify-latency-slo-breach.md
          runbook_url: https://docs.aegislabs.io/runbooks/verify-latency-slo-breach
          description: |
            /v1/verify p99 latency is {{ $value | humanizeDuration }} for 10 min — within
            25% of the 200 ms hard SLO. Investigate before it crosses. Same diagnosis
            tree as the critical alert; no automatic page-out yet.

      - alert: VerifyErrorRateHigh
        expr: |
          sum(rate(aegis_verify_total{decision="denied",denial_reason!~"AGENT_REVOKED|POLICY_REVOKED|POLICY_EXPIRED"}[5m]))
          /
          clamp_min(sum(rate(aegis_verify_total[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: warning
          team: aegis-oncall
          surface: verify
          slo: success
        annotations:
          summary: "Verify denial rate > 5% (excluding legitimate revocations)"
          runbook: infra/observability/runbooks/verify-error-rate-high.md
          runbook_url: https://docs.aegislabs.io/runbooks/verify-error-rate-high
          description: |
            Non-revocation denial rate is {{ $value | humanizePercentage }}. Common
            causes: relying-party SDK regression (INVALID_SIGNATURE spike), policy
            misconfiguration (SCOPE_NOT_GRANTED spike), or BATE drift
            (TRUST_SCORE_TOO_LOW spike). The denial-reason mix on the verify dashboard
            tells you which.

      # Multi-window multi-burn-rate alerts (Google SRE workbook, ch. 5).
      # SLO: 99.95% success → error rate budget = 0.0005.
      # 14.4x burn for 1h windows = 0.0072 error rate sustained for 1h consumes
      # 30d budget in 2 days. 6x burn for 6h windows = early signal.
      - alert: VerifyErrorBudgetFastBurn
        expr: |
          (1 - job:aegis_verify_success_ratio:1h) > (14.4 * 0.0005)
          and
          (1 - job:aegis_verify_success_ratio:5m) > (14.4 * 0.0005)
        for: 2m
        labels:
          severity: critical
          team: aegis-oncall
          surface: verify
          slo: budget
        annotations:
          summary: "Verify error-budget burning at 14.4x — 30d budget gone in 2 days at this rate"
          runbook: infra/observability/runbooks/error-budget-burn.md
          runbook_url: https://docs.aegislabs.io/runbooks/error-budget-burn
          description: |
            Verify is failing fast enough to exhaust the 30-day error budget in
            ~2 days if sustained. 1h success ratio: {{ $value }}. This is the
            page-now signal. Expect either a recent deploy regression, a Postgres
            issue, or an upstream dependency outage. Runbook covers all three.

      - alert: VerifyErrorBudgetSlowBurn
        expr: |
          (1 - job:aegis_verify_success_ratio:6h) > (6 * 0.0005)
          and
          (1 - job:aegis_verify_success_ratio:1h) > (6 * 0.0005)
        for: 15m
        labels:
          severity: warning
          team: aegis-oncall
          surface: verify
          slo: budget
        annotations:
          summary: "Verify error-budget burning at 6x — silent regression likely"
          runbook: infra/observability/runbooks/error-budget-burn.md
          runbook_url: https://docs.aegislabs.io/runbooks/error-budget-burn
          description: |
            Sustained 6x burn over 6h. 6h success ratio: {{ $value }}. Not yet at
            page-now severity, but the budget will be gone in ~5 days at this
            rate. This usually catches slow-leak regressions that the fast-burn
            alert misses (e.g. one principal's policies all failing).

  # ---------------------------------------------------------------------------
  # aegis.audit — chain integrity. Audit chain breaks are P0 SOC2 issues:
  # SOC2 CC7.2 requires complete audit logs; a missed append breaks the
  # signed hash chain irrecoverably. No latency tolerance here.
  # ---------------------------------------------------------------------------
  - name: aegis.audit
    interval: 60s
    rules:
      - alert: AuditChainAppendFailureRate
        expr: sum(rate(aegis_audit_append_total{result="error"}[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
          team: aegis-oncall
          surface: audit
          compliance: soc2-cc7.2
        annotations:
          summary: "Audit chain append failures > 0.01/s — SOC2 evidence path broken"
          runbook: infra/observability/runbooks/audit-chain-break.md
          runbook_url: https://docs.aegislabs.io/runbooks/audit-chain-break
          description: |
            aegis_audit_append_total{result="error"} rate is {{ $value }} appends/s.
            Every failed append is an event we couldn't chain — irrecoverable for
            SOC2 evidence on that record. Do NOT wait. Open the runbook now;
            confirm whether the failure is signing-key, Postgres, or schema.

      - alert: AuditAppendStalled
        expr: |
          (rate(aegis_verify_total[10m]) > 0)
          and
          (absent(rate(aegis_audit_append_total[10m])) or rate(aegis_audit_append_total[10m]) == 0)
        for: 10m
        labels:
          severity: critical
          team: aegis-oncall
          surface: audit
          compliance: soc2-cc7.2
        annotations:
          summary: "Verify traffic flowing but audit appends are zero — chain stalled"
          runbook: infra/observability/runbooks/audit-chain-break.md
          runbook_url: https://docs.aegislabs.io/runbooks/audit-chain-break
          description: |
            /v1/verify is serving but aegis_audit_append_total has not incremented
            for 10 min. Either AuditService is throwing silently (CLAUDE.md
            invariant #4 violation), the audit module wiring is broken, or the
            metric is registered but never observed. All three are P0.

  # ---------------------------------------------------------------------------
  # aegis.bate — trust-score recompute lag. The BATE worker landed in round 2
  # but only emits aegis_bate_score_delta. Queue-age and per-signal counters
  # are not yet emitted; the alerts below are kept structurally correct but
  # disabled until the emitter ships. DO NOT remove — flipping `expr` once
  # the metric exists is a one-line change.
  # ---------------------------------------------------------------------------
  - name: aegis.bate
    interval: 60s
    rules:
      - alert: BateRecomputeLag
        # tracked: M-007 follow-up — emit aegis_bate_queue_oldest_job_age_seconds
        # from bate.worker.ts (BullMQ exposes job.processedOn via getJob).
        # Real expr will be: aegis_bate_queue_oldest_job_age_seconds > 60
        expr: vector(0) > 1
        for: 5m
        labels:
          severity: warning
          team: aegis-oncall
          surface: bate
          status: disabled-pending-metric
        annotations:
          summary: "[DISABLED] BATE recompute queue oldest job > 60s"
          runbook: infra/observability/runbooks/bate-recompute-lag.md
          runbook_url: https://docs.aegislabs.io/runbooks/bate-recompute-lag
          description: |
            DISABLED until bate.worker.ts emits aegis_bate_queue_oldest_job_age_seconds.
            Tracked as M-007 follow-up. When the metric ships, replace expr with:
              aegis_bate_queue_oldest_job_age_seconds > 60
            The runbook is correct; only the trigger is stubbed.

      - alert: BateAnomalySignalSpike
        # tracked: M-007 follow-up — emit aegis_bate_signals_total{severity,signal_type}
        # from BateService.ingestSignal. The R-1..R-5 anomaly rules referenced
        # in docs/BATE_ALGORITHM.md are still open per round-2 handoff.
        # Real expr will be: sum by (signal_type) (rate(aegis_bate_signals_total{severity="critical"}[5m])) > 1
        expr: vector(0) > 1
        for: 5m
        labels:
          severity: warning
          team: aegis-oncall
          surface: bate
          status: disabled-pending-metric
        annotations:
          summary: "[DISABLED] BATE critical-severity signal spike"
          runbook: infra/observability/runbooks/bate-recompute-lag.md
          runbook_url: https://docs.aegislabs.io/runbooks/bate-recompute-lag
          description: |
            DISABLED until aegis_bate_signals_total ships from BateService.
            Will fire when critical signals exceed 1/s for any signal_type —
            usually a fraud-source spike or a misconfigured relying party
            spamming negative signals.

  # ---------------------------------------------------------------------------
  # aegis.webhooks — DLQ + delivery health. ABANDONED is the terminal status
  # set by webhook.delivery.ts after MAX_ATTEMPTS=8 (OD-005). A spike means
  # downstream customer endpoints are systematically broken or we've shipped
  # a bad payload schema.
  # ---------------------------------------------------------------------------
  - name: aegis.webhooks
    interval: 60s
    rules:
      - alert: WebhookDLQSpike
        expr: sum(rate(aegis_webhook_delivery_total{status="abandoned"}[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          team: aegis-oncall
          surface: webhooks
        annotations:
          summary: "Webhook DLQ rate > 0.5/s — deliveries giving up after 8 attempts"
          runbook: infra/observability/runbooks/webhook-dlq-spike.md
          runbook_url: https://docs.aegislabs.io/runbooks/webhook-dlq-spike
          description: |
            Webhook abandonment rate is {{ $value }}/s. Each abandoned delivery
            is a customer who didn't get notified after 8 retries spanning ~8 min.
            Common causes: customer endpoint returning persistent 5xx, signature
            verification failure (if we changed the signing scheme), or a payload
            schema change without a deprecation window.

      - alert: WebhookDeliveryFailureRate
        expr: |
          sum(rate(aegis_webhook_delivery_total{status="failed"}[5m]))
          /
          clamp_min(sum(rate(aegis_webhook_delivery_total[5m])), 0.001)
          > 0.20
        for: 15m
        labels:
          severity: warning
          team: aegis-oncall
          surface: webhooks
        annotations:
          summary: "Webhook attempt failure rate > 20%"
          runbook: infra/observability/runbooks/webhook-dlq-spike.md
          runbook_url: https://docs.aegislabs.io/runbooks/webhook-dlq-spike
          description: |
            One in five delivery attempts is failing ({{ $value | humanizePercentage }}).
            This is upstream of the DLQ alert — catching it here means we still have
            time to fix before deliveries start abandoning. Check whether one specific
            event type or one specific customer endpoint dominates the failures.

  # ---------------------------------------------------------------------------
  # aegis.cache — Redis hit rate. Requires the redis_exporter sidecar
  # (oliver006/redis_exporter), which is NOT yet in docker-compose.yml /
  # Railway. Alerts kept structurally correct; flipped to disabled until
  # the exporter ships (tracked: M-019).
  # ---------------------------------------------------------------------------
  - name: aegis.cache
    interval: 60s
    rules:
      - alert: RedisHitRateLow
        # tracked: M-019 — add redis_exporter to docker-compose.yml + Railway.
        # Real expr (with exporter present):
        #   sum(rate(redis_keyspace_hits_total[5m]))
        #   /
        #   clamp_min(sum(rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])), 0.001)
        #   < 0.85
        expr: vector(0) > 1
        for: 15m
        labels:
          severity: info
          team: aegis-oncall
          surface: cache
          status: disabled-pending-exporter
        annotations:
          summary: "[DISABLED] Redis verify-path cache hit rate < 85%"
          runbook: infra/observability/runbooks/redis-hit-rate-low.md
          runbook_url: https://docs.aegislabs.io/runbooks/redis-hit-rate-low
          description: |
            DISABLED until redis_exporter is deployed (M-019). The Grafana
            dashboard panel 4 also references aegis_cache_hits_total /
            aegis_cache_misses_total which are NOT emitted by the API — that
            panel is broken and will be fixed alongside this exporter.

  # ---------------------------------------------------------------------------
  # aegis.platform — process-level health that doesn't fit the SLO buckets.
  # ---------------------------------------------------------------------------
  - name: aegis.platform
    interval: 30s
    rules:
      - alert: HTTP5xxRateHigh
        expr: |
          sum(rate(aegis_http_requests_total{status_class="5xx"}[5m]))
          /
          clamp_min(sum(rate(aegis_http_requests_total[5m])), 0.001)
          > 0.02
        for: 10m
        labels:
          severity: critical
          team: aegis-oncall
          surface: platform
        annotations:
          summary: "API 5xx rate > 2% — process or dependency is throwing"
          runbook: infra/observability/runbooks/verify-error-rate-high.md
          runbook_url: https://docs.aegislabs.io/runbooks/verify-error-rate-high
          description: |
            5xx rate is {{ $value | humanizePercentage }}. This is platform-level —
            uncaught exceptions, Postgres unreachable, OOM kills, etc. Check
            `kubectl logs` or Railway logs first; the verify-error-rate runbook's
            "process-level diagnosis" section applies.

      - alert: EventLoopLagHigh
        # collectDefaultMetrics is registered with prefix='aegis_' in
        # metrics.service.ts:57, so the standard nodejs_eventloop_lag_seconds
        # gauge is exposed as aegis_nodejs_eventloop_lag_seconds.
        expr: aegis_nodejs_eventloop_lag_seconds{quantile="0.99"} > 0.1
        for: 5m
        labels:
          severity: warning
          team: aegis-oncall
          surface: platform
        annotations:
          summary: "Node event loop lag p99 > 100ms — sync work blocking the loop"
          runbook: infra/observability/runbooks/verify-latency-slo-breach.md
          runbook_url: https://docs.aegislabs.io/runbooks/verify-latency-slo-breach
          description: |
            Event loop p99 lag is {{ $value | humanizeDuration }}. This is the
            single best leading indicator of latency SLO breach: sync CPU work
            (crypto, JSON parsing on giant payloads, GC pauses) is starving the
            loop. The verify-latency runbook has the heap + flame graph steps.
