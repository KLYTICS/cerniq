# =============================================================================
# CERNIQ — pgBackRest configuration
# =============================================================================
# Stanza:        cerniq
# RTO target:    30 minutes  (full restore + WAL replay + verification)
# RPO target:    5 minutes   (continuous archive-async push, PITR-capable)
#
# Why these targets:
#   CERNIQ audit events are SOC2 evidence. A loss window > 5 minutes would
#   void our claim of "complete and continuous audit records" against
#   CC7.2 (system monitoring). The 30-minute restore window matches the
#   incident-response SLA documented in docs/DR_RUNBOOK.md.
#
# Where this file is mounted:
#   /etc/pgbackrest/pgbackrest.conf  (root:postgres 0640)
#
# Repository host:
#   Cloudflare R2 / Backblaze B2 / AWS S3 — any S3-compatible store works.
#   Cipher pass + repo credentials live in the operator's secret manager
#   and are injected as environment variables (PGBACKREST_REPO1_S3_KEY,
#   PGBACKREST_REPO1_S3_KEY_SECRET, PGBACKREST_REPO1_CIPHER_PASS) at
#   process-start time. They MUST NOT be written into this file in plain
#   text in production. See ../kms/rotation-runbook.md for cipher-pass
#   rotation alongside KMS rotation.
# =============================================================================

[global]
# ── Repository (S3-compatible) ──────────────────────────────────────────────
repo1-type=s3
repo1-s3-endpoint=<placeholder.s3.endpoint>
# operator: e.g. s3.amazonaws.com, <accountid>.r2.cloudflarestorage.com,
#           or s3.<region>.backblazeb2.com
repo1-s3-bucket=<placeholder-cerniq-backups>
# operator: provision once; bucket MUST have versioning + object lock enabled
repo1-s3-region=<placeholder-region>
# operator: e.g. us-east-1; for R2 use "auto"
repo1-s3-key=
# operator: provision via secret manager, export as PGBACKREST_REPO1_S3_KEY
repo1-s3-key-secret=
# operator: provision via secret manager, export as PGBACKREST_REPO1_S3_KEY_SECRET
repo1-path=/cerniq

# ── Encryption at rest in the backup repo ───────────────────────────────────
# Defense in depth on top of S3 server-side encryption.
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=
# operator: provision via secret manager; rotate with KMS rotation runbook.
# Quarterly rotation is documented in ../kms/rotation-runbook.md.
# Losing this passphrase makes every existing backup unrecoverable —
# treat it like a root key.

# ── Retention ───────────────────────────────────────────────────────────────
# 14 fulls + diffs between them gives ~14 days of point-in-time targets,
# which covers a human-detectable corruption window with margin.
repo1-retention-full=14
repo1-retention-diff=2

# ── Throughput / compression ────────────────────────────────────────────────
process-max=4
compress-type=zst
compress-level=6

# ── WAL streaming + queue safety ────────────────────────────────────────────
# archive-async lets the WAL writer hand off to the pgBackRest async process
# without blocking client commits — this is what keeps RPO at 5 min during
# load spikes. The queue cap protects pgdata from filling up if the repo is
# unreachable; alert before this fills.
archive-async=y
archive-push-queue-max=1GiB

# ── Restore / verify ergonomics ─────────────────────────────────────────────
# start-fast=y forces a CHECKPOINT at backup start so we don't wait for the
# next natural one. delta=y lets restores skip files whose checksums match
# (cuts our 30-min RTO substantially on warm targets).
start-fast=y
delta=y

# ── Logging ─────────────────────────────────────────────────────────────────
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# ── Stanza ──────────────────────────────────────────────────────────────────
[cerniq]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-host-user=postgres
# operator: if pg1 is on a different host, set pg1-host=<hostname> and wire
# SSH between the backup host and the database host.
