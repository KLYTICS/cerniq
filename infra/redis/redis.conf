# =============================================================================
# OKORO — Redis 7 production configuration
# =============================================================================
# Mounted at /usr/local/etc/redis/redis.conf and passed to redis-server as
# its sole argument (see infra/railway/redis.service.json `config.command`).
#
# Hardening choices are documented inline. If you change one, update the
# rationale; "for some reason" is not an acceptable comment.
#
# Stock redis.conf has hundreds of knobs we do NOT touch. The list below
# is the production override set, nothing more.
# =============================================================================

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------
# bind: Railway plugins expose Redis on the internal Railway network only.
# Bind to all interfaces so the plugin's network namespace can reach us;
# isolation is enforced upstream (no public ingress).
bind 0.0.0.0 -::*

# protected-mode: when bind is permissive AND no auth is set, refuse to
# serve. We DO set requirepass below, but enabling protected-mode is
# belt-and-braces — if requirepass is ever cleared (operator error), the
# server fails closed instead of becoming an open Redis.
protected-mode yes

# port: standard. TLS port is left off until we move off the Railway
# plugin's internal network.
port 6379

# tcp-keepalive: 300s detects half-open connections from a NAT'd worker
# without spamming SYNs.
tcp-keepalive 300

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
# requirepass: REPLACE this placeholder at deploy time. Either:
#   (a) Use Railway's plugin which auto-templates the value from
#       REDIS_PASSWORD, or
#   (b) Substitute via envsubst before mounting.
# Do NOT commit a real password to this file.
requirepass REPLACE_AT_DEPLOY_TIME

# user / ACL: Redis 7 supports per-user ACLs. Phase 1 uses a single
# password; ACLs come in Phase 2 alongside the BATE worker split.
# Future: define a "verify" user with read-only command set.

# -----------------------------------------------------------------------------
# Memory + eviction
# -----------------------------------------------------------------------------
# maxmemory: container-level cap. Override per environment via
# REDIS_MAXMEMORY (the start command can `--maxmemory $REDIS_MAXMEMORY`).
# 200 MB is a safe default under a 256 MB plan, leaving headroom for the
# RDB fork on save.
maxmemory 200mb

# maxmemory-policy: allkeys-lru is correct for OKORO:
#   - Cache entries (agent:, policy:, trust:) are pure cache and tolerate
#     eviction (the API falls back to Postgres).
#   - BullMQ queue keys are namespaced + carry their own TTLs; LRU rarely
#     reaches them under normal load.
#   - Spend counter keys (`spend:{policyId}:day:*`) are reconciled to
#     SpendRecord in Postgres lazily, so eviction means a brief over- or
#     under-count that the next write rectifies — acceptable.
# Do NOT pick `noeviction` — it would surface as 5xx to the verify path
# under cache pressure, breaking the latency SLO.
maxmemory-policy allkeys-lru

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------
# AOF (append-only file) on. fsync everysec balances durability with
# throughput; the BullMQ queue can tolerate < 1s of replay on a crash
# because each job is idempotent.
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"

# AOF rewrite: trigger when the file doubles past 64 MB. Keeps the file
# bounded without thrashing on small writes.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots in addition to AOF — belt-and-braces. Restore order:
# AOF first; RDB only if AOF is corrupt.
save 900 1     # after 900s if at least 1 key changed
save 300 10    # after 300s if at least 10 keys changed
save 60 10000  # after 60s if at least 10000 keys changed
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# -----------------------------------------------------------------------------
# Command hardening (the important section)
# -----------------------------------------------------------------------------
# Rationale: Redis ships several commands that are dangerous in a
# production cache. We disable them at the server level. An attacker who
# obtains the requirepass cannot use these to escalate.
#
# CONFIG: Disabling CONFIG via network (rename to empty string).
#   Why: CONFIG SET dir + CONFIG SET dbfilename + BGSAVE is a known
#   primitive for writing arbitrary files (e.g. SSH authorized_keys)
#   when Redis runs under a writable home dir. Even on a containerized
#   non-root setup, denying CONFIG removes an entire class of post-
#   exploitation moves. Operator: re-enable temporarily for diagnostics
#   by editing this file and restarting; never via CLI.
rename-command CONFIG ""

# DEBUG: lets a connected client crash the server (DEBUG SLEEP, DEBUG
# SEGFAULT) or read internals. Useless to legitimate clients.
rename-command DEBUG ""

# FLUSHDB / FLUSHALL: hard-deletes the cache. OKORO never wants this from
# an app connection — a flush mid-request would cascade to verify-path
# Postgres reads and tank latency. Operators flush via a maintenance
# window using a temporary, separately-authenticated session.
rename-command FLUSHDB ""
rename-command FLUSHALL ""

# KEYS: O(N) blocking scan. Forbidden in production code paths. We use
# SCAN with cursor + MATCH, full stop. Renaming KEYS to empty makes
# accidental KEYS calls fail loudly instead of silently freezing the
# server.
rename-command KEYS ""

# SHUTDOWN: an operator with the password should not be able to take the
# whole service down with a typo. Restart goes through the Railway
# dashboard.
rename-command SHUTDOWN ""

# We do NOT disable SCRIPT/EVAL — BullMQ depends on Lua scripts for
# atomic queue operations. Disabling them would break the queue.

# -----------------------------------------------------------------------------
# Slow log
# -----------------------------------------------------------------------------
slowlog-log-slower-than 10000  # microseconds — log queries slower than 10ms
slowlog-max-len 128

# -----------------------------------------------------------------------------
# Latency monitoring
# -----------------------------------------------------------------------------
latency-monitor-threshold 100  # milliseconds

# -----------------------------------------------------------------------------
# Client output buffer limits
# -----------------------------------------------------------------------------
# Default for normal clients (no limit) is fine. For pub/sub we tighten
# so a slow webhook subscriber can't make the server buffer indefinitely.
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
loglevel notice
logfile ""  # log to stdout — Railway captures.

# =============================================================================
