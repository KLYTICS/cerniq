# Cerniq gitleaks configuration.
#
# Extends the default ruleset with allowlists for known false positives.
# This project ships Aegis FAPI examples with env var names like
# `JWT_ED25519_PRIVATE_KEY_B64` (the *name*, not a value) and public
# DID:key identifiers — both legitimately trip the default generic-api-key
# rule. Allowlist the patterns rather than disable the rule, so genuinely
# unknown secrets still fire.
#
# Audit log: established 2026-05-24 after a 35-finding history scan turned
# out to be 100% false positives (all env-var names, public DIDs, fixture
# JWTs with literal "INVALID_SIGNATURE" / "test.sig" markers, and ULIDs).
# When adding to this file, prefer narrow regexes that only match the
# known-safe shape, not broad disables.

[extend]
useDefault = true

[allowlist]
description = "Cerniq known-safe patterns (env var names, public DIDs, test fixtures)"

regexes = [
  # Env var *names* referenced in configs / docs / .env.example — the name
  # itself is non-sensitive; the value is what would be the secret.
  '''JWT_ED25519_PRIVATE_KEY_B64''',
  '''_PRIVATE_KEY_B64''',

  # Fixture JWTs with explicit "this is fake" markers baked in.
  '''AAAA_INVALID_SIGNATURE_AAAA''',
  '''NOT_FOUND_[A-Za-z0-9]+''',
  '''eyJhbGci[A-Za-z0-9_-]+\.test\.sig''',

  # Truncated JWT documentation snippets (end in literal "..." for brevity).
  '''eyJhbGci[A-Za-z0-9_-]*\.\.\.''',

  # W3C DID:key identifiers — base58btc-encoded Ed25519 *public* keys.
  # Format: z6Mk + 44 base58btc chars. Intentionally public by spec.
  '''z6Mk[1-9A-HJ-NP-Za-km-z]{44,}''',

  # JS/TS variable references that contain "Key" or "private" in their
  # name but reference a runtime value, not embed one.
  '''args\.privateKeyB64u''',
  '''priv_test_b64u''',

  # Aegis profile version identifier (string constant, not a credential).
  '''aegis-fapi-\d+\.\d+-aligned-\d+\.\d+''',

  # ULIDs (Crockford base32, 26 chars). Used as deterministic test IDs.
  '''01[A-HJKMNP-TV-Z0-9]{24}''',
]

# Paths that legitimately contain fixture credentials. Be specific —
# don't allowlist entire packages or top-level directories.
paths = [
  '''tools/postman/.+\.collection\.json$''',
  '''packages/sdk-py/tests/.+\.py$''',
  '''packages/sdk-ts/.+\.spec\.ts$''',
  '''examples/.+/agent-sim\.ts$''',
  '''scripts/generate-postman-walkthrough\.ts$''',
]
