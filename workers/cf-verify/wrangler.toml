# Cloudflare Worker for the CERNIQ verify hot path. Phase 3.
#
# DO NOT DEPLOY UNTIL Phase 3 is unlocked (see CLAUDE.md / WORK_BOARD.md).
# This file exists so the worker shape and bindings are checked in early —
# Phase 3 work is "wire it up", not "design it from scratch".

name = "cerniq-cf-verify"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Smart placement — run close to the database for now (Railway / us-east-1).
# Once we ship a regional Postgres replica, switch to "smart" with explicit
# placement_hint set per region.
[placement]
mode = "smart"

# KV namespace holding pre-computed trust scores. Populated by the BATE
# worker (NestJS side) writing to Cloudflare via API token after each score
# recompute. The Worker reads and never writes.
[[kv_namespaces]]
binding = "TRUST_KV"
id = "REPLACE_ME_AT_DEPLOY"

# D1 (or HTTP origin fallback) for agent/policy lookups when KV misses.
# We start with HTTP fallback to the origin API (`CERNIQ_ORIGIN_URL`) and
# move to D1 in Phase 3.5 once the replication path is proven.
# [[d1_databases]]
# binding = "CERNIQ_DB"
# database_name = "cerniq-edge"
# database_id = "REPLACE_ME_AT_DEPLOY"

[vars]
CERNIQ_ORIGIN_URL = "https://api.cerniq.io"
CERNIQ_VERIFY_TIMEOUT_MS = "1500"

# Secrets (set via `wrangler secret put`):
#   CERNIQ_AUDIT_PUBLIC_KEY_B64   — to verify audit chain entries at the edge
#   CERNIQ_FALLBACK_API_KEY        — verify-key used when falling back to origin

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "EdgeRateLimiter"

[[migrations]]
tag = "v1"
new_classes = ["EdgeRateLimiter"]

# Observability
[observability]
enabled = true
head_sampling_rate = 1
