<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1340C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1340C4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <!-- Shield body -->
  <path d="M 40,6 L 68,16 L 68,42 Q 68,62 40,74 Q 12,62 12,42 L 12,16 Z"
        fill="url(#shieldGrad)" />
  <!-- Shield inner highlight border -->
  <path d="M 40,10 L 64,19 L 64,42 Q 64,59 40,70 Q 16,59 16,42 L 16,19 Z"
        fill="none" stroke="#00B4FF" stroke-width="0.8" stroke-opacity="0.5" />

  <!-- "A" mark inside shield — geometric -->
  <line x1="40" y1="22" x2="28" y2="54" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="40" y1="22" x2="52" y2="54" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="48" y2="43" stroke="#00B4FF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="86" y="36"
        font-family="'Inter', 'Calibri', 'Trebuchet MS', Arial, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="6"
        fill="#0A0E27">AEGIS</text>

  <!-- Tagline -->
  <text x="87" y="55"
        font-family="'Inter', 'Calibri', Arial, sans-serif"
        font-size="10"
        font-weight="400"
        letter-spacing="2.5"
        fill="#64748B">ATTESTATION FOR THE AGENTIC ERA</text>
</svg>
