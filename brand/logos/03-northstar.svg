<?xml version="1.0" encoding="UTF-8"?>
<!--
  OKORO Logo — Direction 3: The North Star
  —
  A 4-point compass star inside a circle. The vertical axis is longer
  than the horizontal — true north. Direct reference to "Switzerland of
  agent identity" — orientation, neutrality, fixed reference point.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
  <defs>
    <linearGradient id="ns-aurora" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="48" cy="48" r="38" stroke="#2B3554" stroke-width="1.5"/>

  <!-- Compass star — long vertical, shorter horizontal axes -->
  <!-- Vertical axis (true north — longer) -->
  <path d="M 48 14 L 53 48 L 48 82 L 43 48 Z"
        fill="url(#ns-aurora)"/>
  <!-- Horizontal axis (shorter) -->
  <path d="M 18 48 L 48 52 L 78 48 L 48 44 Z"
        fill="#F4F6FF" fill-opacity="0.9"/>

  <!-- Center pivot -->
  <circle cx="48" cy="48" r="3" fill="#0B1020" stroke="#5BE0FF" stroke-width="1.5"/>

  <!-- Cardinal tick marks -->
  <line x1="48" y1="6" x2="48" y2="10" stroke="#5BE0FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="86" x2="48" y2="90" stroke="#2B3554" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="48" x2="10" y2="48" stroke="#2B3554" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="86" y1="48" x2="90" y2="48" stroke="#2B3554" stroke-width="1.5" stroke-linecap="round"/>
</svg>
