<?xml version="1.0" encoding="UTF-8"?>
<!--
  OKORO Wordmark — Primary
  —
  Pairs the recommended Shield mark with the OKORO wordmark in tight
  technical sans (Inter Tight / Geist). Tracking is open (0.16em) and
  weight is medium-bold (600) to match the geometric mark.
  Use this as the default lockup in marketing surfaces.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" fill="none">
  <defs>
    <linearGradient id="wm-aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="55%" stop-color="#8B6BFF"/>
      <stop offset="100%" stop-color="#FF5BD0"/>
    </linearGradient>
    <linearGradient id="wm-shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161D33"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
  </defs>

  <!-- Shield mark, scaled to 64x64 inside left zone -->
  <g transform="translate(8 8)">
    <path d="M32 4 L54.7 16 L54.7 40 Q54.7 46.7 48 50.7 L32 60 L16 50.7 Q9.3 46.7 9.3 40 L9.3 16 Z"
          fill="url(#wm-shield-fill)"
          stroke="url(#wm-aurora)"
          stroke-width="1.5"
          stroke-linejoin="round"/>
    <line x1="9.3" y1="32" x2="54.7" y2="32" stroke="#5BE0FF" stroke-width="0.7" stroke-opacity="0.5"/>
    <path d="M24 26.7 L32 14.7 L40 26.7" stroke="#F4F6FF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="27" y1="22" x2="37" y2="22" stroke="#F4F6FF" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="32" cy="44" r="1.7" fill="#5BE0FF"/>
  </g>

  <!-- Wordmark: OKORO — uppercase, open tracking, medium-bold geometric sans -->
  <text x="92" y="52"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="38"
        font-weight="600"
        letter-spacing="6"
        fill="#F4F6FF">OKORO</text>
</svg>
