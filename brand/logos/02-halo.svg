<?xml version="1.0" encoding="UTF-8"?>
<!--
  AEGIS Logo — Direction 2: The Halo
  —
  A perfect circle with a single notch cut at the top — like a key has
  turned in it. The notch is the moment of verification. Inside, a small
  cyan anchor marks the verification point.
  Most ABSTRACT direction — feels like infrastructure. Strong alternate.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
  <defs>
    <linearGradient id="halo-aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
  </defs>

  <!-- Outer halo: a circle interrupted by a notch at the top -->
  <!-- Drawn as an arc starting and ending at the notch -->
  <path d="
    M 52 12.4
    A 36 36 0 1 1 44 12.4"
    stroke="url(#halo-aurora)"
    stroke-width="3.5"
    stroke-linecap="round"/>

  <!-- The notch's interior bracket (key-turned moment) -->
  <path d="M 44 12.4 L 44 18 M 52 12.4 L 52 18"
        stroke="#5BE0FF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Inner anchor dot — the verified state -->
  <circle cx="48" cy="48" r="6" fill="url(#halo-aurora)"/>

  <!-- Halo glow ring (subtle inner echo) -->
  <circle cx="48" cy="48" r="22" stroke="#5BE0FF" stroke-width="1" stroke-opacity="0.3"/>
</svg>
