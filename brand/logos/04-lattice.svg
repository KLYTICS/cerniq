<?xml version="1.0" encoding="UTF-8"?>
<!--
  CERNIQ Logo — Direction 4: The Lattice
  —
  Three nodes connected as a triangle, with a fourth chain link emerging.
  Direct visualization of the audit hash chain — most "infrastructure"
  feeling. Best for technical audiences and SDK marketing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
  <defs>
    <linearGradient id="lat-aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
  </defs>

  <!-- Triangular hash chain: three nodes -->
  <!-- Connecting lines first so circles render on top -->
  <line x1="24" y1="68" x2="48" y2="22" stroke="url(#lat-aurora)" stroke-width="2"/>
  <line x1="48" y1="22" x2="72" y2="68" stroke="url(#lat-aurora)" stroke-width="2"/>
  <line x1="24" y1="68" x2="72" y2="68" stroke="url(#lat-aurora)" stroke-width="2"/>

  <!-- Continuation line — chain extends -->
  <line x1="72" y1="68" x2="86" y2="78"
        stroke="#5BE0FF" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="3 3"/>

  <!-- Three primary nodes -->
  <circle cx="48" cy="22" r="6" fill="#0B1020" stroke="#5BE0FF" stroke-width="2"/>
  <circle cx="24" cy="68" r="6" fill="#0B1020" stroke="#5BE0FF" stroke-width="2"/>
  <circle cx="72" cy="68" r="6" fill="#0B1020" stroke="#8B6BFF" stroke-width="2"/>

  <!-- Inner anchor on top node = "the verified anchor" -->
  <circle cx="48" cy="22" r="2" fill="#5BE0FF"/>

  <!-- Continuation node (faded) -->
  <circle cx="86" cy="78" r="3" fill="#5BE0FF" fill-opacity="0.35"/>
</svg>
