<?xml version="1.0" encoding="UTF-8"?>
<!--
  OKORO Logo — Direction 5: The Verified Mark
  —
  A checkmark whose tail extends into a key tooth. Single glyph fusing
  "verified" with "identity." Most direct semantically — riskier because
  checkmark logos exist (Foursquare, Verisign) but the key-tooth is the
  ownable twist.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
  <defs>
    <linearGradient id="vm-aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BE0FF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (optional badge container) -->
  <rect x="4" y="4" width="88" height="88" rx="20"
        fill="#0B1020" stroke="#2B3554" stroke-width="1"/>

  <!-- Checkmark + key — single continuous stroke -->
  <!-- Path: starts upper-left tick, dips into checkmark valley, rises into long
       diagonal tail, then tail steps right (key tooth) before terminating in
       the key bow (small circle eye) -->
  <path d="
    M 22 50
    L 38 66
    L 62 30
    L 70 30
    L 70 38
    L 76 38"
    stroke="url(#vm-aurora)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Key bow at the very tip (small open circle = the eye) -->
  <circle cx="80" cy="38" r="3" stroke="#5BE0FF" stroke-width="2.4" fill="none"/>

  <!-- Subtle verification anchor at checkmark valley -->
  <circle cx="38" cy="66" r="1.8" fill="#5BE0FF"/>
</svg>
