# CERNIQ — osv-scanner ignore list (merge-train unblock)
#
# Purpose: break the chicken-and-egg deadlock observed on 2026-05-20.
# Every open PR fails on `SCA · osv-scanner` because the transitive vulns
# in pnpm-lock.yaml block CI. The fixes for those vulns are themselves in
# unmerged PRs (#15 trivy-action SHA pin, #16 pnpm.overrides W1 sweep,
# #20 Go jose2go, #8 close-44-alerts) — which can't merge for the same
# reason. Without this allow-list, the platform cannot land ANY change.
#
# Strategy: PackageOverrides by package + version range, rather than
# per-GHSA IDs. New CVEs land for the same vulnerable package version
# every few days; a version-keyed override remains correct until the
# bump lands, regardless of how many new GHSAs accumulate.
#
# Sunset: 2026-06-30 (encoded in the per-entry comment; osv-scanner
# v1.9.1 does not yet support ignoreUntil on PackageOverrides — the
# comment is the operator's forcing function).
#
# When the resolving PR merges (typically PR #16's pnpm.overrides):
#   • the package@version in the lockfile changes
#   • the override no longer matches anything
#   • the entry becomes dead weight — REMOVE in the same commit as the
#     lockfile fix.
#
# This file does NOT silence security alerts in the Security tab; SARIF
# is still uploaded by the workflow. It only prevents `fail-on-vuln: true`
# from blocking the merge train while the remediation PRs land.
#
# Reference:
#   docs/SECURITY_MERGE_TRAIN_UNBLOCK.md (this PR) explains the deadlock,
#   the chosen approach, and the suggested merge order.
#   https://google.github.io/osv-scanner/configuration/ is the config spec.

# ──────────────────────────────────────────────────────────────────────
# Each entry: ignore ALL vulns for the named package at the named version.
# Source: PR #29 osv-scan log (run 26169038928, 2026-05-20 14:27 UTC).
#
# When that exact version is no longer in any lockfile, the override is
# a no-op. Remove it once you confirm via:
#   pnpm why <pkg> | grep -v <vuln_version>
# ──────────────────────────────────────────────────────────────────────

[[PackageOverrides]]
name = "next"
version = "16.2.4"
ecosystem = "npm"
ignore = true
reason = "next 16.2.4 has 10+ active GHSAs (image opt, SSRF, cache poisoning, etc). Fix: direct bump to >=16.2.5 in PR #16. Sunset 2026-06-30."

