# AEGIS — osv-scanner ignore list (merge-train unblock)
#
# Purpose: break the chicken-and-egg deadlock observed on 2026-05-20.
# Every open PR fails on `SCA · osv-scanner` because the transitive vulns
# in pnpm-lock.yaml block CI. The fixes for those vulns are themselves in
# unmerged PRs (#15 trivy-action SHA pin, #16 pnpm.overrides W1 sweep,
# #20 Go jose2go, #8 close-44-alerts) — which can't merge for the same
# reason. Without this allow-list, the platform cannot land ANY change.
#
# Each entry below:
#   • cites the resolving PR (or upstream patch)
#   • sets an explicit `ignoreUntil` sunset (default 2026-06-30 — gives
#     30 days for the backlog to drain)
#   • carries a `reason` field that a SOC2 auditor can read
#
# When a resolving PR merges:
#   • re-run osv-scanner on main; if the vuln no longer appears, REMOVE
#     the entry in the same commit as the merged fix.
#   • do NOT extend `ignoreUntil` without explicit operator sign-off; the
#     sunset is the forcing function.
#
# When `ignoreUntil` passes and the vuln still appears:
#   • CI fails again. The on-call action is: investigate why the resolving
#     PR didn't land, or escalate to a hard upstream-pin via pnpm.overrides.
#
# This file does NOT silence security alerts in the Security tab; SARIF
# is still uploaded by the workflow. It only prevents `fail-on-vuln: true`
# from blocking the merge train while the remediation PRs land.
#
# Reference: docs/SUPPLY_CHAIN_HARDENING.md (PR #23) once that lands.

# ──────────────────────────────────────────────────────────────────────
# HIGH severity — remediated by pnpm.overrides in PR #16 / direct dep
# bumps elsewhere.
# ──────────────────────────────────────────────────────────────────────

