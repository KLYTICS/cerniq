# <0.217.0. Operator decision (OPERATOR_DECISIONS.md § OD-021, DECIDED
# 2026-05-24): ACCEPT IN INTERIM. Real exposure is low — the Prometheus
# exporter is scraped by an in-cluster Prometheus, never internet-facing.
# The fix (>=0.217.0) breaks `Resource` and `ReadableSpan` shape in
# `apps/api/src/common/observability/tracing.bootstrap.ts`, requiring a
# scheduled half-day migration that's tracked separately. Until that
# migration lands, this override keeps `SCA · osv-scanner` from blocking
# every merge. Note OD-021 says "before any deploy where Prometheus
# exporter is internet-facing" — the operator must remove these entries
# in lockstep with the OTel v2 migration commit.
#
# Sunset trigger: OTel v2 migration PR — when sdk-node moves to >=0.217.0
# the lockfile entries change and these overrides become dead. Remove in
# the same commit as the version bump.

